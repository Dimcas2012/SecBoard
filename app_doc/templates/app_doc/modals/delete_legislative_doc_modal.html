{% load i18n %}
<!-- Delete Legislative Document Modal -->
<div class="modal fade" id="deleteLegislativeDocModal" tabindex="-1" aria-labelledby="deleteLegislativeDocModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteLegislativeDocModalLabel">{% trans "Delete Document" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="deleteLegislativeDocForm" method="post">
                {% csrf_token %}
                <div class="modal-body">
                    <input type="hidden" id="deleteDocId" name="doc_id">
                    <p>{% trans "Are you sure you want to delete this document?" %}</p>
                    <p class="text-danger">{% trans "This action cannot be undone." %}</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Cancel" %}</button>
                    <button type="submit" class="btn btn-danger">{% trans "Delete" %}</button>
                </div>
            </form>
        </div>
    </div>
</div>
