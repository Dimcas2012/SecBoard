{% load i18n %}
<div class="modal fade" id="relatedDocsModal" tabindex="-1" aria-labelledby="relatedDocsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="relatedDocsModalLabel">{% trans "Related Documents" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>{% trans "Name" %}</th>
                                <th>{% trans "Company" %}</th>
                                <th>{% trans "Version" %}</th>
                                <th>{% trans "Date" %}</th>
                                <th>{% trans "File" %}</th>
                            </tr>
                        </thead>
                        <tbody id="relatedDocsTableBody">
                            <!-- Data will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
            </div>
        </div>
    </div>
</div>
