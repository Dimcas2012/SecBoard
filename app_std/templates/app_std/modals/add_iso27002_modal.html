<!-- templates/app_std/modals/add_iso27002_modal.html -->
{% load static %}
{% load i18n %}
{% load std_custom_filters %}

<div class="modal fade" id="addISO27002Modal" tabindex="-1" aria-labelledby="addISO27002ModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addISO27002ModalLabel">{% trans "Add New ISO 27002 Control" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addISO27002Form">
                    {% csrf_token %}

                    <!-- Control Number and Theme -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="control-number" class="form-label">{% trans "Control Number" %}</label>
                            <input type="text" class="form-control" id="control-number" name="control_number" required>
                        </div>
                        <div class="col-md-6">
                            <label for="theme" class="form-label">{% trans "Theme" %}</label>
                            <select class="form-select" id="theme" name="theme" required>
                                <option value="people">{% trans "People" %}</option>
                                <option value="physical">{% trans "Physical" %}</option>
                                <option value="technological">{% trans "Technological" %}</option>
                                <option value="organizational">{% trans "Organizational" %}</option>
                            </select>
                        </div>
                    </div>

                    <!-- Control Type and Security Domain -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="control-type" class="form-label">{% trans "Control Type" %}</label>
                            <select class="form-select" id="control-type" name="control_type" required>
                                <option value="preventive">{% trans "Preventive" %}</option>
                                <option value="detective">{% trans "Detective" %}</option>
                                <option value="corrective">{% trans "Corrective" %}</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="security-domain" class="form-label">{% trans "Security Domain" %}</label>
                            <select class="form-select" id="security-domain" name="security_domain" required>
                                <option value="Application_security">{% trans "Application security" %}</option>
                                <option value="Asset_management">{% trans "Asset management" %}</option>
                                <option value="Governance">{% trans "Governance" %}</option>
                                <option value="Human_resource_security">{% trans "Human resource security" %}</option>
                                <option value="governance_and_ecosystem">{% trans "Governance and Ecosystem" %}</option>
                                <option value="Identity_and_access_management">{% trans "Identity and access management" %}</option>
                                <option value="Information_protection">{% trans "Information protection" %}</option>
                                <option value="Information_security_event_management">{% trans "Information security event management" %}</option>
                                <option value="Legal_and_compliance">{% trans "Legal and compliance" %}</option>
                                <option value="Physical security">{% trans "Physical security" %}</option>
                                <option value="Protection">{% trans "Protection" %}</option>
                                <option value="Defence">{% trans "Defence" %}</option>
                                <option value="Supplier_relationships_security">{% trans "Supplier relationships security" %}</option>
                            </select>
                        </div>
                    </div>

                    <!-- Security Properties and Concepts -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">{% trans "Information Security Properties" %}</label>
                            <div class="form-check">
                                <input class="form-check-input security-property" type="checkbox" value="confidentiality" id="confidentiality">
                                <label class="form-check-label" for="confidentiality">
                                    {% trans "Confidentiality" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input security-property" type="checkbox" value="integrity" id="integrity">
                                <label class="form-check-label" for="integrity">
                                    {% trans "Integrity" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input security-property" type="checkbox" value="availability" id="availability">
                                <label class="form-check-label" for="availability">
                                    {% trans "Availability" %}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{% trans "Cybersecurity Concepts" %}</label>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept" type="checkbox" value="identify" id="identify">
                                <label class="form-check-label" for="identify">
                                    {% trans "Identify" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept" type="checkbox" value="protect" id="protect">
                                <label class="form-check-label" for="protect">
                                    {% trans "Protect" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept" type="checkbox" value="detect" id="detect">
                                <label class="form-check-label" for="detect">
                                    {% trans "Detect" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept" type="checkbox" value="respond" id="respond">
                                <label class="form-check-label" for="respond">
                                    {% trans "Respond" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept" type="checkbox" value="recover" id="recover">
                                <label class="form-check-label" for="recover">
                                    {% trans "Recover" %}
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Multilingual Fields -->
                    <ul class="nav nav-tabs" id="languageTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#uk-tab" type="button" role="tab">
                                {% trans "Ukrainian" %}
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ru-tab" type="button" role="tab">
                                {% trans "Russian" %}
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#en-tab" type="button" role="tab">
                                {% trans "English" %}
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content mt-3" id="languageTabContent">
                        {% with languages='uk,ru,en' %}
                            {% for lang in languages|split:',' %}
                                <div class="tab-pane fade {% if lang == 'uk' %}show active{% endif %}"
                                     id="{{ lang }}-tab" role="tabpanel">
                                    <div class="mb-3">
                                        <label for="title-{{ lang }}" class="form-label">{% trans "Title" %}</label>
                                        <input type="text" class="form-control" id="title-{{ lang }}"
                                               name="title_{{ lang }}" {% if lang == 'uk' %}required{% endif %}>
                                    </div>
                                    <div class="mb-3">
                                        <label for="control-description-{{ lang }}" class="form-label">{% trans "Control Description" %}</label>
                                        <textarea class="form-control" id="control-description-{{ lang }}"
                                                  name="control_description_{{ lang }}" rows="3" {% if lang == 'uk' %}required{% endif %}></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="purpose-{{ lang }}" class="form-label">{% trans "Purpose" %}</label>
                                        <textarea class="form-control" id="purpose-{{ lang }}"
                                                  name="purpose_{{ lang }}" rows="3" {% if lang == 'uk' %}required{% endif %}></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="guidance-{{ lang }}" class="form-label">{% trans "Guidance" %}</label>
                                        <textarea class="form-control" id="guidance-{{ lang }}"
                                                  name="guidance_{{ lang }}" rows="3" {% if lang == 'uk' %}required{% endif %}></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="other-information-{{ lang }}" class="form-label">{% trans "Other Information" %}</label>
                                        <textarea class="form-control" id="other-information-{{ lang }}"
                                                  name="other_information_{{ lang }}" rows="3"></textarea>
                                    </div>
                                </div>
                            {% endfor %}
                        {% endwith %}
                    </div>

                    <input type="hidden" id="information-security-properties" name="information_security_properties">
                    <input type="hidden" id="cybersecurity-concepts" name="cybersecurity_concepts">
                    <input type="hidden" id="operational-capabilities" name="operational_capabilities">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
                <button type="button" class="btn btn-primary" id="saveNewControl">{% trans "Save Control" %}</button>
            </div>
        </div>
    </div>
</div>

<script>
function showAlert(type, message) {
    alert(message); // Simple alert for now
}

$(document).ready(function() {
    $('#saveNewControl').on('click', function() {
        const formData = new FormData($('#addISO27002Form')[0]);

        // Собираем данные с чекбоксов
        const securityProperties = $('.security-property:checked').map(function() {
            return this.value;
        }).get();
        formData.set('information_security_properties', JSON.stringify(securityProperties));

        const cybersecurityConcepts = $('.cybersecurity-concept:checked').map(function() {
            return this.value;
        }).get();
        formData.set('cybersecurity_concepts', JSON.stringify(cybersecurityConcepts));
        formData.set('operational_capabilities', JSON.stringify([]));

        // Отправляем форму
        $.ajax({
            url: '{% url "add_iso_control" %}',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            headers: {
                'X-CSRFToken': $('[name=csrfmiddlewaretoken]').val()
            },
            success: function(response) {
                if (response.success) {
                    alert('Control added successfully');
                    $('#addISO27002Modal').modal('hide');
                    location.reload();
                } else {
                    alert(response.error || 'Error adding control');
                }
            },
            error: function(xhr) {
                alert(xhr.responseJSON?.error || 'Server error occurred');
            }
        });
    });

    $('#addISO27002Modal').on('hidden.bs.modal', function() {
        $('#addISO27002Form')[0].reset();
        $('.security-property, .cybersecurity-concept').prop('checked', false);
    });
});
</script>
