<!--SecBoard/templates/app_std/modals/ai_pcidss_query_modal.html-->
{% load i18n %}
<!-- AI Query Modal -->
<div class="modal fade" id="aiQueryModal" tabindex="-1" aria-labelledby="aiQueryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="aiQueryModalLabel">{% trans "AI Search Results PCIDSS" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Search query display -->
                <div class="mb-4">
                    <div class="d-flex align-items-center">
                        <h6 class="mb-0 me-2">{% trans "Search Query" %}:</h6>
                        <div class="p-2 bg-light rounded border flex-grow-1 fw-bold" id="searchQueryDisplay" style="min-height: 40px;"></div>
                    </div>
                </div>

                <!-- Loading indicator -->
                <div id="aiSearchLoading" style="display: none;">
                    <div class="progress mb-3">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" 
                             role="progressbar" 
                             style="width: 0%" 
                             id="searchProgress">0%</div>
                    </div>
                    <div class="text-center mb-3" id="searchStatus">
                        {% trans "Initializing search..." %}
                    </div>
                    <div class="d-flex justify-content-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">{% trans "Loading..." %}</span>
                        </div>
                    </div>
                </div>

                <!-- Error message -->
                <div id="aiSearchError" class="alert alert-danger" style="display: none;"></div>

                <!-- Results -->
                <div id="aiSearchResults" style="display: none;">
                    <div id="foundRequirements"></div>
                    <div id="aiExplanation"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
            </div>
        </div>
    </div>
</div>
