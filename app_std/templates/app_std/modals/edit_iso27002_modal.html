<!-- templates/app_std/modals/edit_iso27002_modal.html -->

{% load i18n %}
{% load static %}
{% load std_custom_filters %}

<div class="modal fade" id="editISO27002Modal" tabindex="-1" aria-labelledby="editISO27002ModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editISO27002ModalLabel">{% trans "Edit ISO 27002 Control" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editISO27002Form">
                    {% csrf_token %}
                    <input type="hidden" id="control-id" name="control_id">

                    <!-- Control Number and Theme -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="control-number-modal" class="form-label">{% trans "Control Number" %}</label>
                            <input type="text" class="form-control" id="control-number-modal" name="control_number" required>
                        </div>
                        <div class="col-md-6">
                            <label for="theme-modal" class="form-label">{% trans "Theme" %}</label>
                            <select class="form-select" id="theme-modal" name="theme" required>
                                <option value="people">{% trans "People" %}</option>
                                <option value="physical">{% trans "Physical" %}</option>
                                <option value="technological">{% trans "Technological" %}</option>
                                <option value="organizational">{% trans "Organizational" %}</option>
                            </select>
                        </div>
                    </div>

                    <!-- Control Type and Security Domain -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="control-type-modal" class="form-label">{% trans "Control Type" %}</label>
                            <select class="form-select" id="control-type-modal" name="control_type" required>
                                <option value="preventive">{% trans "Preventive" %}</option>
                                <option value="detective">{% trans "Detective" %}</option>
                                <option value="corrective">{% trans "Corrective" %}</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="security-domain-modal" class="form-label">{% trans "Security Domain" %}</label>
                            <select class="form-select" id="security-domain-modal" name="security_domain" required>
                                <option value="Application_security">{% trans "Application security" %}</option>
                                <option value="Asset_management">{% trans "Asset management" %}</option>
                                <option value="Governance">{% trans "Governance" %}</option>
                                <option value="Human_resource_security">{% trans "Human resource security" %}</option>
                                <option value="governance_and_ecosystem">{% trans "Governance and Ecosystem" %}</option>
                                <option value="Identity_and_access_management">{% trans "Identity and access management" %}</option>
                                <option value="Information_protection">{% trans "Information protection" %}</option>
                                <option value="Information_security_event_management">{% trans "Information security event management" %}</option>
                                <option value="Legal_and_compliance">{% trans "Legal and compliance" %}</option>
                                <option value="Physical security">{% trans "Physical security" %}</option>
                                <option value="Protection">{% trans "Protection" %}</option>
                                <option value="Defence">{% trans "Defence" %}</option>
                                <option value="Supplier_relationships_security">{% trans "Supplier relationships security" %}</option>
                            </select>
                        </div>
                    </div>

                    <!-- Security Properties and Concepts -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">{% trans "Information Security Properties" %}</label>
                            <div class="form-check">
                                <input class="form-check-input security-property-modal" type="checkbox" value="confidentiality" id="confidentiality-modal">
                                <label class="form-check-label" for="confidentiality-modal">
                                    {% trans "Confidentiality" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input security-property-modal" type="checkbox" value="integrity" id="integrity-modal">
                                <label class="form-check-label" for="integrity-modal">
                                    {% trans "Integrity" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input security-property-modal" type="checkbox" value="availability" id="availability-modal">
                                <label class="form-check-label" for="availability-modal">
                                    {% trans "Availability" %}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{% trans "Cybersecurity Concepts" %}</label>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept-modal" type="checkbox" value="identify" id="identify-modal">
                                <label class="form-check-label" for="identify-modal">
                                    {% trans "Identify" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept-modal" type="checkbox" value="protect" id="protect-modal">
                                <label class="form-check-label" for="protect-modal">
                                    {% trans "Protect" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept-modal" type="checkbox" value="detect" id="detect-modal">
                                <label class="form-check-label" for="detect-modal">
                                    {% trans "Detect" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept-modal" type="checkbox" value="respond" id="respond-modal">
                                <label class="form-check-label" for="respond-modal">
                                    {% trans "Respond" %}
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input cybersecurity-concept-modal" type="checkbox" value="recover" id="recover-modal">
                                <label class="form-check-label" for="recover-modal">
                                    {% trans "Recover" %}
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Multilingual Fields -->
                    <ul class="nav nav-tabs" id="languageTabsModal" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#uk-tab-modal" type="button" role="tab">
                                {% trans "Ukrainian" %}
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ru-tab-modal" type="button" role="tab">
                                {% trans "Russian" %}
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#en-tab-modal" type="button" role="tab">
                                {% trans "English" %}
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content mt-3" id="languageTabContentModal">
                        {% for lang in 'uk,ru,en'|split:',' %}
                            <div class="tab-pane fade {% if lang == 'uk' %}show active{% endif %}"
                                 id="{{ lang }}-tab-modal" role="tabpanel">
                                <div class="mb-3">
                                    <label for="title-modal-{{ lang }}" class="form-label">{% trans "Title" %}</label>
                                    <input type="text" class="form-control" id="title-modal-{{ lang }}"
                                           name="title_{{ lang }}" {% if lang == 'uk' %}required{% endif %}>
                                </div>
                                <div class="mb-3">
                                    <label for="control-description-modal-{{ lang }}" class="form-label">{% trans "Control Description" %}</label>
                                    <textarea class="form-control" id="control-description-modal-{{ lang }}"
                                              name="control_description_{{ lang }}" rows="3" {% if lang == 'uk' %}required{% endif %}></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="purpose-modal-{{ lang }}" class="form-label">{% trans "Purpose" %}</label>
                                    <textarea class="form-control" id="purpose-modal-{{ lang }}"
                                              name="purpose_{{ lang }}" rows="3" {% if lang == 'uk' %}required{% endif %}></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="guidance-modal-{{ lang }}" class="form-label">{% trans "Guidance" %}</label>
                                    <textarea class="form-control" id="guidance-modal-{{ lang }}"
                                              name="guidance_{{ lang }}" rows="3" {% if lang == 'uk' %}required{% endif %}></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="other-information-modal-{{ lang }}" class="form-label">{% trans "Other Information" %}</label>
                                    <textarea class="form-control" id="other-information-modal-{{ lang }}"
                                              name="other_information_{{ lang }}" rows="3"></textarea>
                                </div>
                            </div>
                        {% endfor %}
                    </div>

                    <input type="hidden" id="information-security-properties-modal" name="information_security_properties">
                    <input type="hidden" id="cybersecurity-concepts-modal" name="cybersecurity_concepts">
                    <input type="hidden" id="operational-capabilities-modal" name="operational_capabilities">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
                <button type="button" class="btn btn-primary" id="saveChanges">{% trans "Save Changes" %}</button>
            </div>
        </div>
    </div>
</div>
