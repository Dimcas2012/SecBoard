{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Link Expired" %}{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body py-5">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle text-warning" style="font-size: 5rem;"></i>
                    </div>
                    <h2 class="mb-3">{% trans "Link Not Available" %}</h2>
                    <p class="lead">{{ error }}</p>
                    <p class="text-muted">
                        {% trans "If you believe this is an error, please contact the administrator." %}
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
