<!--SecBoard/templates/app_cabinet/modals/delete_user_modal.html-->
{% load i18n %}

{% load i18n %}

<!-- Delete User Modal -->
<div class="modal fade" id="deleteUserModal" tabindex="-1" aria-labelledby="deleteUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteUserModalLabel">{% trans "Delete User" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>{% trans "Are you sure you want to delete this user?" %}</p>
                <p><strong>{% trans "This action cannot be undone." %}</strong></p>
                <div id="deleteUserDetails" class="alert alert-warning d-none">
                    <!-- User details will be loaded dynamically here -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Cancel" %}</button>
                <button type="button" id="confirmDeleteUser" class="btn btn-danger">
                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    {% trans "Delete" %}
                </button>
            </div>
        </div>
    </div>
</div>
