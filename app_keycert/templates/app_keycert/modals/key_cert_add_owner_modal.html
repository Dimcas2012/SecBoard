<!-- Add Owner Modal -->
{% load i18n %}
<div class="modal fade owner-modal" id="newOwnerModal" tabindex="-1" aria-labelledby="newOwnerModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="newOwnerModalLabel">{% trans "Add New Owner" %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="newOwnerForm">
          {% csrf_token %}
          <div class="mb-3">
            <label for="ownerName" class="form-label">{% trans "Name" %}</label>
            <input type="text" class="form-control" id="ownerName" name="name" required>
          </div>
          <div class="mb-3">
            <label for="ownerDepartment" class="form-label">{% trans "Department/Position" %}</label>
            <input type="text" class="form-control" id="ownerDepartment" name="department" required>
          </div>
          <div class="mb-3">
            <label for="ownerEmail" class="form-label">{% trans "Email" %}</label>
            <input type="email" class="form-control" id="ownerEmail" name="email" required>
          </div>
          <div class="mb-3">
            <label for="ownerPhone" class="form-label">{% trans "Phone" %}</label>
            <input type="tel" class="form-control" id="ownerPhone" name="phone" required>
          </div>
          <div class="mb-3">
            <label for="ownerNotes" class="form-label">{% trans "Notes" %}</label>
            <textarea class="form-control" id="ownerNotes" name="notes" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
        <button type="submit" form="newOwnerForm" class="btn btn-primary">{% trans "Add Owner" %}</button>
      </div>
    </div>
  </div>
</div>
