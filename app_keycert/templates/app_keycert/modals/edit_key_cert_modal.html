<!-- SecBoard\SecBoard\templates\app_keycert\modals\edit_key_cert_modal.html-->
{% load i18n %}

<div class="modal fade" id="editKeyCertModal" tabindex="-1" aria-labelledby="editKeyCertModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editKeyCertModalLabel">{% trans "Edit Key/Certificate" %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editKeyCertForm">
          {% csrf_token %}
          <input type="hidden" id="id" name="id">

          <div class="mb-3">
            <label for="company" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Select the company associated with this key/certificate' %}">{% trans "Company" %}</label>
            <select class="form-select" id="company" name="company" required>
              <option value="">{% trans "Select Company" %}</option>
              {% for company in companies %}
                <option value="{{ company.id }}">{{ company.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label for="keyCertNum" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Unique textual identifier for the key/certificate' %}">{% trans "Key/Certificate ID" %}</label>
            <input type="text" class="form-control" id="keyCertNum" name="key_cert_num" required>
          </div>

          <h5>{% trans "General Information" %}</h5>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="organizationName" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Name of the organization responsible for this key/certificate' %}">{% trans "Organization Name" %}</label>
              <input type="text" class="form-control" id="organizationName" name="organization_name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="version" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Version number of the key/certificate' %}">{% trans "Version" %}</label>
              <input type="text" class="form-control" id="version" name="version" >
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="dateCreated" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Date and time when the key/certificate was created' %}">{% trans "Date Created" %}</label>
              <input type="datetime-local" class="form-control" id="dateCreated" name="date_created" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="lastUpdated" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Date and time of the last update to the key/certificate' %}">{% trans "Last Updated" %}</label>
              <input type="datetime-local" class="form-control" id="lastUpdated" name="last_updated">
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="maintainerName" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Name of the person responsible for maintaining this key/certificate' %}">{% trans "Maintainer Name" %}</label>
              <input type="text" class="form-control" id="maintainerName" name="maintainer_name" >
            </div>
            <div class="col-md-6 mb-3">
              <label for="maintainerContact" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Contact information for the maintainer' %}">{% trans "Maintainer Contact" %}</label>
              <input type="text" class="form-control" id="maintainerContact" name="maintainer_contact" >
            </div>
          </div>

          <div class="mb-3">
            <label for="typeKeySert" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Type of the key/certificate' %}">{% trans "Type" %}</label>
            <select class="form-select" id="typeKeySert" name="type_key_sert" required>
              <option value="">{% trans "Select Type" %}</option>
              {% for type in key_cert_types %}
                <option value="{{ type.id }}"
                        data-description-en="{{ type.description_en }}"
                        data-description-uk="{{ type.description_uk }}"
                        data-description-ru="{{ type.description_ru }}"
                        data-name-en="{{ type.name_en }}"
                        data-name-uk="{{ type.name_uk }}"
                        data-name-ru="{{ type.name_ru }}">
                  {{ type.get_name }}
                </option>
              {% endfor %}
            </select>
            <div id="typeKeySertDescription" class="form-text mt-2"></div>
          </div>

          <div class="mb-3">
            <label for="purpose" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Intended purpose of the key/certificate' %}">{% trans "Purpose" %}</label>
            <textarea class="form-control" id="purpose" name="purpose" rows="3"></textarea>
          </div>

          <div class="mb-3">
            <label for="location" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Physical or digital location of the key/certificate' %}">{% trans "Location" %}</label>
            <input type="text" class="form-control" id="location" name="location">
          </div>

          <div class="mb-3">
            <label class="form-label" data-bs-toggle="tooltip" title="{% trans 'Owner of the key/certificate' %}">{% trans "Owner" %}</label>
            <div id="editKeyCertOwnerBadge" class="mb-2 d-flex flex-wrap align-items-center gap-1 min-height-badge">
              <span class="text-muted small">{% trans "Not selected" %}</span>
            </div>
            <input type="hidden" id="editKeyCertOwner" name="owner" value="">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="editKeyCertSelectOwnerBtn">
              <i class="fas fa-user-plus me-1"></i>{% trans "Select Owner" %}
            </button>
        </div>


          <div class="mb-3">
            <label for="accessControl" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Access control details for the key/certificate' %}">{% trans "Access Control" %}</label>
            <textarea class="form-control" id="accessControl" name="access_control" rows="3"></textarea>
          </div>

          <div class="mb-3">
            <label for="expiryDate" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Expiration date of the key/certificate' %}">{% trans "Expiry Date" %}</label>
            <input type="date" class="form-control" id="expiryDate" name="expiry_date" required>
          </div>

          <!-- New Reminder Section -->
          <div class="mb-3">
            <label class="form-label">{% trans "Remind Owner" %}</label>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="enableReminder" name="enable_reminder">
                <label class="form-check-label" for="enableReminder">
                    {% trans "Enable reminder" %}
                </label>
            </div>
            <div id="reminderOptions" style="display: none;">
                <div class="mb-3">
                    <label for="reminderDays" class="form-label">{% trans "Number of days before expiry" %}</label>
                    <input type="number" class="form-control" id="reminderDays" name="reminder_days" min="1">
                </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="revocationStatus" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Current revocation status of the key/certificate' %}">{% trans "Revocation Status" %}</label>
            <select class="form-select" id="revocationStatus" name="revocation_status">
              <option value="">{% trans "Select Status" %}</option>
              {% for status in revocation_statuses %}
                <option value="{{ status.id }}"
                        data-description-en="{{ status.description_en }}"
                        data-description-uk="{{ status.description_uk }}"
                        data-description-ru="{{ status.description_ru }}"
                        data-name-en="{{ status.name_en }}"
                        data-name-uk="{{ status.name_uk }}"
                        data-name-ru="{{ status.name_ru }}">
                  {{ status.get_name }}
                </option>
              {% endfor %}
            </select>
            <div id="revocationStatusDescription" class="form-text mt-2"></div>
          </div>

          <div class="mb-3">
            <label for="notes" class="form-label" data-bs-toggle="tooltip" title="{% trans 'Additional notes or comments about the key/certificate' %}">{% trans "Notes" %}</label>
            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-status-container mb-3" style="display: none;">
          <div class="d-flex align-items-center justify-content-center">
              <div class="spinner-border text-primary me-2" role="status">
                  <span class="visually-hidden">{% trans "Loading..." %}</span>
              </div>
              <span class="status-message">{% trans "Processing..." %}</span>
          </div>
          <div class="progress mt-2" style="height: 3px;">
              <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 100%"></div>
          </div>
      </div>
      <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              <i class="fas fa-times"></i> {% trans "Close" %}
          </button>
          <button type="submit" form="editKeyCertForm" class="btn btn-primary" id="editSubmitBtn">
              <i class="fas fa-save"></i> <span class="button-text">{% trans "Save Changes" %}</span>
          </button>
      </div>
    </div>
  </div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/forge/0.10.0/forge.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var currentLang = '{{ LANGUAGE_CODE }}';

    $.ajaxSetup({
        headers: { "X-CSRFToken": $('input[name=csrfmiddlewaretoken]').val() }
    });

    function updateReminderSection() {
        const expiryDate = $('#expiryDate').val();
        const reminderSection = $('.reminder-section');
        const enableReminder = $('#enableReminder');

        if (expiryDate) {
            reminderSection.show();
            if (enableReminder.is(':checked')) {
                validateAndUpdateReminderDays();
            }
        } else {
            enableReminder.prop('checked', false);
            reminderSection.hide();
            $('#reminderOptions').hide();
        }
    }

    function validateReminderDays() {
        const expiryDate = moment($('#expiryDate').val());
        const reminderDays = parseInt($('#reminderDays').val());
        const today = moment().startOf('day');
        const reminderDate = moment(expiryDate).subtract(reminderDays, 'days');

        return {
            isValid: reminderDate.isAfter(today),
            reminderDate: reminderDate,
            daysUntilExpiry: expiryDate.diff(today, 'days')
        };
    }

    function validateAndUpdateReminderDays() {
        if ($('#editKeyCertModal #enableReminder').is(':checked')) {
            const expiryDate = moment($('#editKeyCertModal #expiryDate').val());
            const reminderDays = parseInt($('#editKeyCertModal #reminderDays').val()) || 0;
            const today = moment().startOf('day');
            const daysUntilExpiry = expiryDate.diff(today, 'days');
            const maxDays = Math.max(0, daysUntilExpiry - 1);

            const reminderDaysInput = $('#editKeyCertModal #reminderDays');
            reminderDaysInput.attr('max', maxDays);

            const helpText = $(`<div class="form-text text-muted">{% trans "Maximum" %} ${maxDays} {% trans "days allowed" %}</div>`);
            reminderDaysInput.siblings('.form-text').remove();
            reminderDaysInput.after(helpText);

            if (reminderDays > maxDays || reminderDays <= 0) {
                reminderDaysInput.addClass('is-invalid');
                const errorMessage = `{% trans "Please enter a number between 1 and" %} ${maxDays}`;

                let feedbackDiv = reminderDaysInput.next('.invalid-feedback');
                if (!feedbackDiv.length) {
                    reminderDaysInput.after(`<div class="invalid-feedback">${errorMessage}</div>`);
                } else {
                    feedbackDiv.text(errorMessage);
                }

                // Auto-adjust the value if it's out of range
                if (reminderDays > maxDays) {
                    reminderDaysInput.val(maxDays);
                } else if (reminderDays <= 0) {
                    reminderDaysInput.val(1);
                }
            } else {
                reminderDaysInput.removeClass('is-invalid');
                reminderDaysInput.next('.invalid-feedback').remove();
            }
        }
    }

    function updateDescription(selectElement, descriptionElement) {
        var selectedOption = $(selectElement).find('option:selected');
        var description = selectedOption.data('description-' + currentLang) ||
                         selectedOption.data('description-en') || '';
        var name = selectedOption.data('name-' + currentLang) ||
                  selectedOption.data('name-en') ||
                  selectedOption.text();

        $(selectElement).find('option').each(function() {
            var optionName = $(this).data('name-' + currentLang) ||
                           $(this).data('name-en') ||
                           $(this).text();
            $(this).text(optionName);
        });

        selectedOption.text(name);
        $(descriptionElement).text(description);
    }

    function updateReminderOptionsVisibility(enabled) {
        const reminderOptions = $('#editKeyCertModal #reminderOptions');
        reminderOptions.toggle(enabled);

        if (!enabled) {
            $('#editKeyCertModal #reminderDays').val('');
            $('#editKeyCertModal #reminderStatus').remove();
        }

        if (enabled && !$('#editKeyCertModal #reminderDays').val()) {
            // Set default reminder days (e.g., 30 days before expiry)
            $('#editKeyCertModal #reminderDays').val(30);
        }

        if (enabled) {
            validateAndUpdateReminderDays();
        }
    }

    $('#editKeyCertModal #dateCreated, #editKeyCertModal #lastUpdated').datetimepicker({
        format: 'YYYY-MM-DDTHH:mm',
        useCurrent: false
    });

    $('#editKeyCertModal #expiryDate').datetimepicker({
        format: 'YYYY-MM-DD',
        useCurrent: false
    });

    $('#expiryDate').on('change input', updateReminderSection);

    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl);
    });

    $('#editKeyCertModal #typeKeySert').change(function() {
        updateDescription(this, '#editKeyCertModal #typeKeySertDescription');
    });

    $('#editKeyCertModal #revocationStatus').change(function() {
        updateDescription(this, '#editKeyCertModal #revocationStatusDescription');
    });

    function showLoadingIndicator() {
        const modal = document.querySelector('#editKeyCertModal');
        let overlay = modal.querySelector('.loading-overlay');

        if (!overlay) {
            overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `
                <div class="loading-spinner-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">{% trans "Updating..." %}</div>
                </div>
            `;
            modal.appendChild(overlay);
        }

        overlay.style.display = 'flex';
    }

    function hideLoadingIndicator() {
        const modal = document.querySelector('#editKeyCertModal');
        const overlay = modal.querySelector('.loading-overlay');
        if (overlay) {
            overlay.style.display = 'none';
        }
    }

    function loadKeyCertData(id) {
        $.ajax({
            url: '{% url "get_key_cert" key_cert_id=0 %}'.replace('0', id),
            type: 'GET',
            success: function(data) {
                $('#editKeyCertModal #id').val(data.id);
                $('#editKeyCertModal #keyCertNum').val(data.key_cert_num);
                $('#editKeyCertModal #company').val(data.company);
                $('#editKeyCertModal #typeKeySert').val(data.type_key_sert).trigger('change');
                $('#editKeyCertModal #purpose').val(data.purpose);
                $('#editKeyCertModal #location').val(data.location);
                $('#editKeyCertModal #editKeyCertOwner').val(data.owner ? ('k-' + data.owner.id) : '');
                if (data.owner) {
                    var ownerLabel = data.owner.name + (data.owner.department ? ' - ' + data.owner.department : '') + (data.owner.email ? ' (' + data.owner.email + ')' : '');
                    $('#editKeyCertOwnerBadge').html('<span class="badge bg-secondary">' + ownerLabel + '</span>');
                } else {
                    $('#editKeyCertOwnerBadge').html('<span class="text-muted small">{% trans "Not selected" %}</span>');
                }
                $('#editKeyCertModal #accessControl').val(data.access_control);
                $('#editKeyCertModal #expiryDate').val(moment(data.expiry_date).format('YYYY-MM-DD')).trigger('change');
                $('#editKeyCertModal #revocationStatus').val(data.revocation_status).trigger('change');
                $('#editKeyCertModal #notes').val(data.notes);

                $('#editKeyCertModal #organizationName').val(data.general_info.organization_name);
                $('#editKeyCertModal #dateCreated').val(moment(data.general_info.date_created).format('YYYY-MM-DDTHH:mm'));
                $('#editKeyCertModal #lastUpdated').val(
                    data.general_info.last_updated ?
                    moment(data.general_info.last_updated).format('YYYY-MM-DDTHH:mm') : ''
                );
                $('#editKeyCertModal #version').val(data.general_info.version);
                $('#editKeyCertModal #maintainerName').val(data.general_info.maintainer_name);
                $('#editKeyCertModal #maintainerContact').val(data.general_info.maintainer_contact);

                const enableReminder = data.enable_reminder;
                const reminderDays = data.reminder_days;
                const reminderSent = data.reminder_sent;

                $('#editKeyCertModal #enableReminder').prop('checked', enableReminder);
                updateReminderOptionsVisibility(enableReminder);

                if (enableReminder && reminderDays) {
                    let statusInfo = `${reminderDays} days before expiry`;
                    $('#editKeyCertModal #reminderDays').val(reminderDays);
                    validateAndUpdateReminderDays();

                    if (statusInfo) {
                        statusInfo += reminderSent ? ' (Sent)' : ' (Pending)';
                        let statusElement = $('#editKeyCertModal #reminderStatus');
                        if (!statusElement.length) {
                            $('#editKeyCertModal #reminderOptions').append(
                                '<div id="reminderStatus" class="mt-2 text-info"></div>'
                            );
                            statusElement = $('#editKeyCertModal #reminderStatus');
                        }
                        statusElement.text(statusInfo);
                    }
                }

                $('#editKeyCertModal').modal('show');
            },
            error: function(xhr, status, error) {
                console.error("Error loading key/certificate data:", error);
                alert("An error occurred while loading the key/certificate data");
            }
        });
    }

    $('#editKeyCertForm').submit(function(e) {
        e.preventDefault();
        const form = $(this);
        const submitButton = $('#editSubmitBtn');
        const statusContainer = $('.modal-status-container');
        const statusMessage = $('.status-message');

        if (form[0].checkValidity() === false) {
            e.stopPropagation();
            form.addClass('was-validated');
            return;
        }

        // Validate reminder settings
        if ($('#enableReminder').is(':checked')) {
            const validation = validateReminderDays();
            if (!validation.isValid) {
                const maxDays = validation.daysUntilExpiry - 1;
                alert(`{% trans "Cannot set reminder for" %} ${$('#reminderDays').val()} {% trans "days before expiry as it would be in the past. Please choose a number less than" %} ${maxDays}`);
                return;
            }
        }

        // Show loading state
        submitButton.prop('disabled', true);
        submitButton.find('.button-text').text('{% trans "Saving..." %}');
        submitButton.find('.fas').removeClass('fa-save').addClass('fa-spinner fa-spin');
        statusContainer.show();
        statusMessage.text('{% trans "Validating data..." %}');

        const formData = new FormData(this);
        const id = $('#editKeyCertModal #id').val();

        // Handle owner selection (value can be k-{id} or c-{cabinet_user_id})
        const selectedOwner = $('#editKeyCertModal #editKeyCertOwner').val();
        if (selectedOwner) {
            formData.set('owner', selectedOwner);
        } else {
            formData.delete('owner');
        }

        // Handle last updated
        const lastUpdated = $('#editKeyCertModal #lastUpdated').val();
        if (!lastUpdated) {
            formData.delete('last_updated');
        }

        // Handle reminder settings
        const enableReminder = $('#editKeyCertModal #enableReminder').is(':checked');
        formData.set('enable_reminder', enableReminder);

        if (enableReminder) {
            const reminderDays = $('#editKeyCertModal #reminderDays').val();
            if (!reminderDays || isNaN(reminderDays) || reminderDays < 1) {
                statusMessage.text('{% trans "Error: Invalid reminder days" %}');
                statusContainer.removeClass('text-primary').addClass('text-danger');
                alert("{% trans 'Please enter a valid number of days for the reminder' %}");
                return;
            }
            formData.set('reminder_type', 'days');
            formData.set('reminder_days', reminderDays);
        } else {
            formData.delete('reminder_type');
            formData.delete('reminder_days');
        }

        statusMessage.text('{% trans "Saving changes..." %}');

        $.ajax({
            url: '{% url "edit_key_cert" key_cert_id=0 %}'.replace('0', id),
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function(response) {
                if (response.success) {
                    statusMessage.text('{% trans "Changes saved successfully!" %}');
                    statusContainer.removeClass('text-primary text-danger').addClass('text-success');

                    setTimeout(function() {
                        $('#editKeyCertModal').modal('hide');
                        if ($.fn.DataTable.isDataTable('#keyCertTable')) {
                            $('#keyCertTable').DataTable().ajax.reload(null, false);
                        }
                    }, 1000);
                } else {
                    statusMessage.text('{% trans "Error: " %}' + response.error);
                    statusContainer.removeClass('text-primary').addClass('text-danger');
                    alert("{% trans 'Error' %}: " + response.error);
                }
            },
            error: function(xhr, status, error) {
                console.error("Error updating key/certificate:", xhr.responseText);
                statusMessage.text('{% trans "Error occurred" %}');
                statusContainer.removeClass('text-primary').addClass('text-danger');

                try {
                    const response = JSON.parse(xhr.responseText);
                    alert("{% trans 'Error' %}: " + response.error);
                } catch(e) {
                    alert("{% trans 'An unexpected error occurred while updating the key/certificate' %}");
                }
            },
            complete: function() {
                setTimeout(function() {
                    submitButton.prop('disabled', false);
                    submitButton.find('.button-text').text('{% trans "Save Changes" %}');
                    submitButton.find('.fas').removeClass('fa-spinner fa-spin').addClass('fa-save');
                    if (!statusContainer.hasClass('text-danger')) {
                        statusContainer.hide();
                    }
                }, 1000);
            }
        });
    });

    $('#editKeyCertModal').on('shown.bs.modal', function() {
        updateDescription('#editKeyCertModal #typeKeySert', '#editKeyCertModal #typeKeySertDescription');
        updateDescription('#editKeyCertModal #revocationStatus', '#editKeyCertModal #revocationStatusDescription');

        tooltipList.forEach(function(tooltip) {
            tooltip.dispose();
        });
        tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });
    });

    $('#editKeyCertModal').on('hidden.bs.modal', function () {
        hideLoadingIndicator();
        $(this).find('form')[0].reset();
        updateReminderOptionsVisibility(false);
        $('.is-invalid').removeClass('is-invalid');
        $('.invalid-feedback').remove();
    });

    $('#newOwnerModal').on('hidden.bs.modal', function() {
        $('#newOwnerForm')[0].reset();
        $('#newOwnerForm').removeClass('was-validated');
    });

    $('#editOwnerModal').on('hidden.bs.modal', function() {
        $('#editOwnerForm')[0].reset();
        $('#editOwnerForm').removeClass('was-validated');
    });


    $('#editKeyCertModal #enableReminder').change(function() {
        const expiryDate = $('#editKeyCertModal #expiryDate').val();
        if (this.checked && !expiryDate) {
            alert("{% trans 'Please set expiry date first' %}");
            $(this).prop('checked', false);
            return;
        }
        updateReminderOptionsVisibility(this.checked);
        if (this.checked) {
            validateAndUpdateReminderDays();
        }
    });

    $('#reminderDays, #expiryDate').on('input change', validateAndUpdateReminderDays);

    $('.form-check-input').on('change', function() {
        $(this).closest('form').removeClass('was-validated');
    });

    $(document).on('click', '.edit-key-cert', function() {
        var id = $(this).data('id');
        loadKeyCertData(id);
    });

    $(document).on('languageChanged', function(e, newLang) {
        currentLang = newLang;
        $('#editKeyCertModal #typeKeySert, #editKeyCertModal #revocationStatus').trigger('change');
    });
});
</script>
