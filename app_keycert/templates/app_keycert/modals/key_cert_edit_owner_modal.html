<!-- Edit Owner Modal -->
{% load i18n %}
<div class="modal fade" id="editOwnerModal" tabindex="-1" aria-labelledby="editOwnerModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editOwnerModalLabel">{% trans "Edit Owner" %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editOwnerForm">
          {% csrf_token %}
          <input type="hidden" id="editOwnerId" name="id">
          <div class="mb-3">
            <label for="editOwnerName" class="form-label">{% trans "Name" %}</label>
            <input type="text" class="form-control" id="editOwnerName" name="name" required>
          </div>
          <div class="mb-3">
            <label for="editOwnerDepartment" class="form-label">{% trans "Department" %}</label>
            <input type="text" class="form-control" id="editOwnerDepartment" name="department" required>
          </div>
          <div class="mb-3">
            <label for="editOwnerEmail" class="form-label">{% trans "Email" %}</label>
            <input type="email" class="form-control" id="editOwnerEmail" name="email" required>
          </div>
          <div class="mb-3">
            <label for="editOwnerPhone" class="form-label">{% trans "Phone" %}</label>
            <input type="tel" class="form-control" id="editOwnerPhone" name="phone" required>
          </div>
          <div class="mb-3">
            <label for="editOwnerNotes" class="form-label">{% trans "Notes" %}</label>
            <textarea class="form-control" id="editOwnerNotes" name="notes"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
        <button type="submit" form="editOwnerForm" class="btn btn-primary">{% trans "Save Changes" %}</button>
      </div>
    </div>
  </div>
</div>
