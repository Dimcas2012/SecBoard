{% load i18n %}
<div class="btn-group sb-toolbar flex-nowrap" role="group">
    <a href="{% url 'compliance:local_compliance' %}" class="btn btn-outline-secondary btn-sm btn-icon-action{% if active == 'dashboard' %} active{% endif %}"
       title="{% trans 'Dashboard' %}">
        <i class="bi bi-speedometer2"></i>
    </a>
    <a href="{% url 'compliance:local_requirement_instances_list' %}" class="btn btn-outline-primary btn-sm btn-icon-action{% if active == 'applications' %} active{% endif %}"
       title="{% trans 'Applications' %}">
        <i class="bi bi-building"></i>
    </a>
    <a href="{% url 'compliance:local_requirements_library' %}" class="btn btn-outline-success btn-sm btn-icon-action{% if active == 'templates' %} active{% endif %}"
       title="{% trans 'Templates' %}">
        <i class="bi bi-layers"></i>
    </a>
    <a href="{% url 'compliance:control_mapping' %}" class="btn btn-outline-info btn-sm btn-icon-action{% if active == 'mapping' %} active{% endif %}"
       title="{% trans 'Control Mapping' %}">
        <i class="bi bi-diagram-3"></i>
    </a>
    {% if show_create %}
    <a href="{% url 'compliance:local_requirement_template_create' %}" class="btn btn-outline-success btn-sm btn-icon-action"
       title="{% trans 'New Template' %}">
        <i class="bi bi-plus-circle"></i>
    </a>
    {% endif %}
    <button type="button" class="btn btn-outline-info btn-sm btn-icon-action sb-btn-guide" data-bs-toggle="modal"
            data-bs-target="#{% if guide_modal_id %}{{ guide_modal_id }}{% else %}localComplianceGuideModal{% endif %}"
            title="{% trans 'Guide' %}">
        <i class="bi bi-book"></i>
    </button>
</div>
