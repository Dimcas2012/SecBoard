<!-- Asset Administrators Modal -->
<!-- SecBoard\SecBoard\templates\app_asset\modals\asset_administrators_modal.html-->
{% load i18n %}

<div class="modal fade" id="administratorsModal" tabindex="-1" aria-labelledby="administratorsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="administratorsModalLabel">{% trans "Asset Administrators" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h6>{% trans "Current Administrators" %}</h6>
                <ul id="administratorsList" class="list-group mb-3"></ul>

                <h6>{% trans "Add Existing Administrator" %}</h6>
                <div class="mb-3">
                    <select id="existingAdministrators" class="form-select">
                        <option value="">{% trans "Select an administrator" %}</option>
                    </select>
                    <button id="addExistingAdministrator" class="btn btn-primary mt-2">{% trans "Add Selected Administrator" %}</button>
                </div>

                <h6 id="adminFormTitle">{% trans "Add New Administrator" %}</h6>
                <form id="administratorForm">
                    {% csrf_token %}
                    <input type="hidden" id="asset_id_admin" name="asset_id">
                    <input type="hidden" id="admin_id" name="admin_id">
                    <input type="hidden" id="admin_company_id" name="company_id">
                    <input type="hidden" id="admin_company" name="company">
                    <div class="mb-3">
                        <label for="admin_name" class="form-label">{% trans "Name" %}</label>
                        <input type="text" class="form-control" id="admin_name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="admin_department" class="form-label">{% trans "Department" %}</label>
                        <input type="text" class="form-control" id="admin_department" name="department" required>
                    </div>
                    <div class="mb-3">
                        <label for="admin_position" class="form-label">{% trans "Position" %}</label>
                        <input type="text" class="form-control" id="admin_position" name="position" required>
                    </div>
                    <div class="mb-3">
                        <label for="admin_email" class="form-label">{% trans "Email" %}</label>
                        <input type="email" class="form-control" id="admin_email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="admin_phone" class="form-label">{% trans "Phone" %}</label>
                        <input type="tel" class="form-control" id="admin_phone" name="phone" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveAdminBtn">{% trans "Save" %}</button>
                </form>
            </div>
        </div>
    </div>
</div>
