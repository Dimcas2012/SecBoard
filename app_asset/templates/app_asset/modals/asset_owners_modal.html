<!--Asset Owners Modal -->
<!-- SecBoard\SecBoard\templates\app_asset\modals\asset_owners_modal.html-->
{% load i18n %}
<div class="modal fade" id="ownersModal" tabindex="-1" aria-labelledby="ownersModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ownersModalLabel">{% trans "Asset Owners" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h6>{% trans "Current Owners" %}</h6>
                <ul id="ownersList" class="list-group mb-3"></ul>

                <h6>{% trans "Add Existing Owner" %}</h6>
                <div class="mb-3">
                    <select id="existingOwners" class="form-select">
                        <option value="">{% trans "Select an owner" %}</option>
                    </select>
                    <button id="addExistingOwner" class="btn btn-primary mt-2">{% trans "Add Selected Owner" %}</button>
                </div>

                <h6 id="ownerFormTitle">{% trans "Add New Owner" %}</h6>
                <form id="ownerForm">
                    {% csrf_token %}
                    <input type="hidden" id="asset_id_owner" name="asset_id">
                    <input type="hidden" id="owner_company_id" name="company_id">
                    <div class="mb-3">
                        <label for="owner_name" class="form-label">{% trans "Name" %}</label>
                        <input type="text" class="form-control" id="owner_name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="owner_department" class="form-label">{% trans "Department" %}</label>
                        <input type="text" class="form-control" id="owner_department" name="department" required>
                    </div>
                    <div class="mb-3">
                        <label for="owner_position" class="form-label">{% trans "Position" %}</label>
                        <input type="text" class="form-control" id="owner_position" name="position" required>
                    </div>
                    <div class="mb-3">
                        <label for="owner_email" class="form-label">{% trans "Email" %}</label>
                        <input type="email" class="form-control" id="owner_email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="owner_phone" class="form-label">{% trans "Phone" %}</label>
                        <input type="tel" class="form-control" id="owner_phone" name="phone" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveOwnerBtn">{% trans "Save" %}</button>
                </form>
            </div>
        </div>
    </div>
</div>
