{% load static %}
<link rel="stylesheet" href="{% static 'app_asset/css/asset-ui.css' %}">
<script src="{% static 'js/secboard-filter-collapse.js' %}" defer></script>
<script src="{% static 'app_asset/js/asset-table-pagination.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (!window.bootstrap || !bootstrap.Tooltip) {
        return;
    }
    document.querySelectorAll('.asset-page [data-bs-toggle="tooltip"]').forEach(function(el) {
        if (!bootstrap.Tooltip.getInstance(el)) {
            new bootstrap.Tooltip(el);
        }
    });
});
</script>
