<!--SecBoard/templates/app_risk/threats_scripts.html-->
{% load static %}
{% load i18n %}


<script>
// Utility function to escape HTML
function escapeHtml(text) {
    var map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

// Global alert function
function showAlert(type, message) {
    var alertClass = type === 'success' ? 'alert-success' :
                     type === 'error' ? 'alert-danger' :
                     type === 'warning' ? 'alert-warning' :
                     'alert-info';
    
    var icon = type === 'success' ? '<i class="fas fa-check-circle me-2"></i>' :
               type === 'error' ? '<i class="fas fa-exclamation-circle me-2"></i>' :
               type === 'warning' ? '<i class="fas fa-exclamation-triangle me-2"></i>' :
               '<i class="fas fa-info-circle me-2"></i>';
    
    var alertHtml = `
        <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
            ${icon}${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    `;
    
    // Find or create alert container
    var alertContainer = $('#alertContainer');
    if (alertContainer.length === 0) {
        alertContainer = $('<div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1050"></div>');
        $('body').append(alertContainer);
    }
    
    alertContainer.append(alertHtml);
    
    // Remove the alert after 5 seconds
    setTimeout(function() {
        alertContainer.find('.alert:first-child').alert('close');
    }, 5000);
}

// Function to clear validation errors
function clearValidationErrors() {
    $('.is-invalid').removeClass('is-invalid');
    $('.invalid-feedback').remove();
}

$(document).ready(function() {
    var currentLanguage = '{{ current_language }}';
    var threatModal = new bootstrap.Modal(document.getElementById('threatModal'));

    // DataTables initialization
    var threatsTable = null;
    
    // Check if table exists before initializing
    if ($('#threatsTable').length > 0) {
        console.log('Initializing DataTables for threats table');
        threatsTable = $('#threatsTable').DataTable({
        "dom": '<"row"<"col-sm-12"tr>>',
        "lengthChange": false,
        "processing": true,
        "serverSide": false,
    "ajax": {
        "url": "{% url 'get_threats' %}",
            "type": "GET",
        "data": function(d) {
            d.language = currentLanguage;
            },
            "dataSrc": function(json) {
                // Ensure we return an array
                if (window.DEBUG_MODE) {
                    console.log('DataTables received JSON:', json);
                }
                
                if (json && json.threats && Array.isArray(json.threats)) {
                    if (window.DEBUG_MODE) {
                        console.log('Returning threats array with', json.threats.length, 'items');
                        // Log first item for debugging
                        if (json.threats.length > 0) {
                            console.log('First threat data:', json.threats[0]);
                        }
                    }
                    return json.threats;
                } else if (Array.isArray(json)) {
                    if (window.DEBUG_MODE) {
                        console.log('Returning direct array with', json.length, 'items');
                    }
                    return json;
                } else {
                    console.error('Invalid data format received:', json);
                    return [];
                }
            },
            "error": function(xhr, error, thrown) {
                console.error('DataTables AJAX error:', error, thrown);
                console.error('Response:', xhr.responseText);
        }
    },
    "columns": [
        {
            "data": "id",
            "width": "3%"
        },
        {
            "data": "name",
            "width": "15%",
            "render": function(data, type, row) {
                if (type === 'display' && data && data.length > 30) {
                    return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                }
                return data;
            }
        },
        {
            "data": "description",
            "width": "20%",
            "render": function(data, type, row) {
                if (type === 'display' && data && data.length > 30) {
                    return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                }
                return data;
            }
        },
        {
            "data": "risks",
            "width": "15%",
            "render": function(data, type, row) {
                if (type === 'display' && data && data.length > 30) {
                    return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                }
                return data;
            }
        },
        {
            "data": "probability_scenario",
            "width": "10%",
            "render": function(data, type, row) {
                if (type === 'display') {
                    switch (data) {
                        case 'manual':
                            return '{% trans "Manual input" %}';
                        case 'daily':
                            return '{% trans "Daily" %}';
                        case 'm_in_n_days':
                            return `${row.scenario_m} {% trans "times in" %} ${row.scenario_n} {% trans "days" %}`;
                        case 'once_in_n_years':
                            return `{% trans "Once in" %} ${row.scenario_n} {% trans "years" %}`;
                        case 'm_in_n_years':
                            return `${row.scenario_m} {% trans "times in" %} ${row.scenario_n} {% trans "years" %}`;
                        default:
                            return data;
                    }
                }
                return data;
            }
        },
        {
            "data": "probability",
                            "width": "8%",
            "render": function(data, type, row) {
                if (type === 'display') {
                                    var probabilityValue = 0;
                                    if (data !== null && data !== undefined) {
                                        if (typeof data === 'string') {
                                            probabilityValue = parseFloat(data) || 0;
                                        } else if (typeof data === 'number') {
                                            probabilityValue = data;
                                        } else {
                                            probabilityValue = 0;
                                        }
                                    }
                                    
                    if (!isNaN(probabilityValue)) {
                        var percent = probabilityValue * 100;
                                        var cssClass = percent >= 70 ? 'impact-high' : 
                                                     percent >= 40 ? 'impact-medium' : 'impact-low';
                                        return '<span class="impact-text ' + cssClass + '">' + probabilityValue.toFixed(4) + '</span>';
                    } else {
                                        return '<span class="impact-text impact-secondary">Invalid</span>';
                    }
                }
                return data;
            }
        },
        {
            "data": "impact",
            "width": "8%",
            "render": function(data, type, row) {
                if (type === 'display') {
                    var impactValue = 0;
                    if (data !== null && data !== undefined) {
                        if (typeof data === 'string') {
                            impactValue = parseFloat(data) || 0;
                        } else if (typeof data === 'number') {
                            impactValue = data;
                        } else {
                            impactValue = 0;
                        }
                    }
                    
                    if (!isNaN(impactValue)) {
                        var cssClass = impactValue >= 70 ? 'impact-high' : 
                                      impactValue >= 40 ? 'impact-medium' : 'impact-low';
                        return '<span class="impact-text ' + cssClass + '">' + impactValue.toFixed(2) + '</span>';
                    } else {
                        return '<span class="impact-text impact-secondary">-</span>';
                    }
                }
                return data;
            }
        },
        {
            "data": "overall_impact",
            "width": "8%",
            "render": function(data, type, row) {
                if (type === 'display') {
                    // Ensure overallImpact is a number
                    var overallImpact = 0;
                    if (data !== null && data !== undefined) {
                        if (typeof data === 'string') {
                            overallImpact = parseFloat(data) || 0;
                        } else if (typeof data === 'number') {
                            overallImpact = data;
                        } else {
                            overallImpact = 0;
                        }
                    }
                    
                    if (isNaN(overallImpact)) {
                        overallImpact = 0;
                    }
                    
                    var cssClass = overallImpact >= 0.7 ? 'impact-high' : 
                                  overallImpact >= 0.4 ? 'impact-medium' : 'impact-low';
                    return '<span class="impact-text ' + cssClass + '">' + overallImpact.toFixed(3) + '</span>';
                }
                return data;
            }
        },
        {
            "data": "financial_impact",
            "width": "8%",
            "render": function(data, type, row) {
                if (type === 'display') {
                    if (data && typeof data === 'object' && data.name) {
                        // New format with color
                        var color = data.color || '#17a2b8'; // Default to info color if no color provided
                        return '<span class="impact-text" style="color: ' + color + ';">' + data.name + '</span>';
                    } else if (data && typeof data === 'string') {
                        // Old format - just string, use default color
                        return '<span class="impact-text impact-info">' + data + '</span>';
                    } else {
                        return '<span class="impact-text impact-secondary">-</span>';
                    }
                }
                return data ? (typeof data === 'object' ? data.name : data) : '';
            }
        },
        {
            "data": "operational_impact",
            "width": "8%",
            "render": function(data, type, row) {
                if (type === 'display') {
                    if (data && typeof data === 'object' && data.name) {
                        // New format with color
                        var color = data.color || '#17a2b8'; // Default to info color if no color provided
                        return '<span class="impact-text" style="color: ' + color + ';">' + data.name + '</span>';
                    } else if (data && typeof data === 'string') {
                        // Old format - just string, use default color
                        return '<span class="impact-text impact-info">' + data + '</span>';
                    } else {
                        return '<span class="impact-text impact-secondary">-</span>';
                    }
                }
                return data ? (typeof data === 'object' ? data.name : data) : '';
            }
        },
        {
            "data": "reputational_impact",
            "width": "8%",
            "render": function(data, type, row) {
                if (type === 'display') {
                    if (data && typeof data === 'object' && data.name) {
                        var color = data.color || '#17a2b8';
                        return '<span class="impact-text" style="color: ' + color + ';">' + data.name + '</span>';
                    } else if (data && typeof data === 'string') {
                        return '<span class="impact-text impact-info">' + data + '</span>';
                    } else {
                        return '<span class="impact-text impact-secondary">-</span>';
                    }
                }
                return data ? (typeof data === 'object' ? data.name : data) : '';
            }
        },
        {
            "data": "translations",
            "orderable": false,
            "width": "8%",
            "render": function(data, type, row) {
                if (type !== 'display' || !Array.isArray(data) || data.length === 0) {
                    return Array.isArray(data) && data.length > 0 ? data.map(function(t) { return t.country_code; }).join(', ') : '—';
                }
                return data.map(function(t) {
                    return '<span class="badge bg-secondary threat-translation-badge me-1" style="cursor: pointer; font-size: 50%;" ' +
                        'data-threat-id="' + (row.id || '') + '" data-country-id="' + (t.country_id || '') + '" ' +
                        'data-country-code="' + (typeof escapeHtml !== 'undefined' ? escapeHtml(t.country_code || '') : (t.country_code || '')) + '" data-country-name="' + (typeof escapeHtml !== 'undefined' ? escapeHtml(t.country_name || '') : (t.country_name || '')) + '" ' +
                        'title="' + (t.country_name || t.country_code || '') + '">' + (typeof escapeHtml !== 'undefined' ? escapeHtml(t.country_code || '') : (t.country_code || '')) + '</span>';
                }).join('');
            }
        },
        {
            "data": null,
            "width": "6%",
            "render": function(data, type, row) {
                let buttons = '';
                if (window.userPermissions && window.userPermissions.can_edit_config) {
                    buttons += '<button class="btn btn-sm btn-outline-primary btn-icon-action edit-threat" data-id="' + row.id + '" title="{% trans "Edit" %}"><i class="bi bi-pencil"></i></button>';
                }
                if (window.userPermissions && window.userPermissions.can_delete_config) {
                    buttons += '<button class="btn btn-sm btn-outline-danger btn-icon-action delete-threat" data-id="' + row.id + '" title="{% trans "Delete" %}"><i class="bi bi-trash"></i></button>';
                }
                return buttons;
            }
        }
    ],
        "language": {
            "url": "https://cdn.datatables.net/plug-ins/1.10.25/i18n/Ukrainian.json"
        },
        "columnDefs": [
            { "orderable": false, "targets": [11, 12] }  // Translations and Actions columns
        ],
        "order": [[0, "asc"]],  // Sort by ID by default
        "pageLength": 25,
        "lengthMenu": [[10, 25, 50, 100], [10, 25, 50, 100]],
        "search": {
            "regex": true,
            "smart": false
        },
        "scrollX": true,
        "scrollCollapse": true,
        "autoWidth": false,
        "initComplete": function() {
            if (window.initRiskDataTablePagination) {
                window.initRiskDataTablePagination({
                    api: this.api(),
                    containerId: 'threatsTablePagination',
                    paginationAriaLabel: '{% trans "Threats pagination" %}',
                    labels: {
                        showing: '{% trans "Showing" %}',
                        of: '{% trans "of" %}',
                        items: '{% trans "records" %}',
                        perPage: '{% trans "Per page" %}'
                    }
                });
            }
        },
        "drawCallback": function() {
            // Initialize Bootstrap tooltips after table is drawn
            $('[title]').tooltip({
                container: 'body',
                placement: 'top'
            });
        },
        "error": function(xhr, error, thrown) {
            console.error('DataTables error:', error, thrown);
            console.error('XHR response:', xhr.responseText);
            // Show error message to user
            if (typeof showAlert === 'function') {
                showAlert('error', 'Error loading threats data. Please refresh the page.');
            }
        }
    });
    } else {
        console.warn('Threats table not found, skipping DataTables initialization');
    }

    function applyThreatsFilters() {
        if (!threatsTable) {
            return;
        }
        var searchVal = $('#searchThreats').val() || '';
        var scenario = $('#filterThreatScenario').val() || '';
        threatsTable.search(searchVal);
        threatsTable.column(4).search(
            scenario ? '^' + $.fn.dataTable.util.escapeRegex(scenario) + '$' : ''
        );
        threatsTable.draw();
    }

    $('#searchThreats').on('keyup', function() {
        applyThreatsFilters();
    });
    $('#filterThreatScenario').on('change', function() {
        applyThreatsFilters();
    });
    var clearThreatsFiltersBtn = document.getElementById('clearThreatsConfigFilters');
    if (clearThreatsFiltersBtn) {
        clearThreatsFiltersBtn.addEventListener('click', function(e) {
            e.preventDefault();
            $('#searchThreats').val('');
            $('#filterThreatScenario').val('');
            applyThreatsFilters();
        });
    }
    
    // Check if probability scenario fields exist
    if ($('#threat-probability-scenario').length > 0) {
        console.log('Probability scenario fields found');
        // Initialize probability fields
        updateProbabilityFields();
    } else {
        console.warn('Probability scenario fields not found');
    }
    
    // Function to get contrast color for text on colored backgrounds
    function getContrastColor(hexcolor) {
        // If hexcolor is not provided or invalid, return black
        if (!hexcolor || !/^#[0-9A-F]{6}$/i.test(hexcolor)) {
            return '#000000';
        }

        // Convert hex to RGB
        var r = parseInt(hexcolor.slice(1, 3), 16);
        var g = parseInt(hexcolor.slice(3, 5), 16);
        var b = parseInt(hexcolor.slice(5, 7), 16);

        // Calculate luminance
        var luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;

        // Return black for light colors, white for dark colors
        return luminance > 0.5 ? '#000000' : '#FFFFFF';
    }

    // Add threat button with permission check
    if (window.userPermissions && window.userPermissions.can_add_config) {
        $('#addThreatBtn').click(function() {
            $('#threatForm')[0].reset();
            $('#threatModalLabel').text('{% trans "Add New Threat" %}');
            $('#threat-id').val('');
            
            // Reload impact levels for current language (Country-based translations) and clear selections
            if (window.threatImpactAssessment) {
                window.threatImpactAssessment.reloadImpactLevelsForCurrentLanguage().then(function() {
                    window.threatImpactAssessment.clearImpactValues();
                }).catch(function() {
                    window.threatImpactAssessment.clearImpactValues();
                });
            }
            
            // Clear scenario parameters
            $('#threat-scenario-m').val('');
            $('#threat-scenario-n').val('');
            
            updateProbabilityFields();
            clearValidationErrors();
            threatModal.show();
        });
    }

    // Edit threat with permission check
    if (window.userPermissions && window.userPermissions.can_edit_config) {
        $(document).on('click', '.edit-threat', function() {
        var threatId = $(this).data('id');
        $('#threatModalLabel').text('{% trans "Edit Threat" %}');
        clearValidationErrors();
        $.get('{% url "edit_threat" threat_id=0 %}'.replace('0', threatId))
            .done(function(data) {
            $('#threat-id').val(data.id);
            $('#threat-name-en').val(data.name_en || '');
            $('#threat-description-en').val(data.description_en || '');
            $('#threat-risks-en').val(data.risks_en || '');
            $('#threat-probability-scenario').val(data.probability_scenario);
            $('#threat-probability').val(data.probability);
            $('#threat-impact').val(data.impact);
                $('#threat-scenario-m').val(data.scenario_m || '');
                $('#threat-scenario-n').val(data.scenario_n || '');
                
                if (window.DEBUG_MODE) {
                    console.log('Set scenario values:', {
                        scenario: data.probability_scenario,
                        m: data.scenario_m,
                        n: data.scenario_n,
                        probability: data.probability
                    });
                }
                
                // Reload impact levels for current language, then set impact assessment values
                var setValuesAndShow = function() {
                    if (window.threatImpactAssessment) {
                        window.threatImpactAssessment.setImpactValues(data);
                    }
                    updateProbabilityFields();
                    updateProbabilityVisual(data.probability);
                    threatModal.show();
                };
                if (window.threatImpactAssessment && window.threatImpactAssessment.reloadImpactLevelsForCurrentLanguage) {
                    window.threatImpactAssessment.reloadImpactLevelsForCurrentLanguage().then(setValuesAndShow).catch(setValuesAndShow);
                } else {
                    setValuesAndShow();
                }
            })
            .fail(function(xhr, status, error) {
                console.error('Error loading threat data:', error);
                showAlert('error', 'Error loading threat data. Please try again.');
        });
    });
    }

    // Save threat with permission check
    if (window.userPermissions && (window.userPermissions.can_add_config || window.userPermissions.can_edit_config)) {
        $('#saveThreatBtn').click(function() {
        var formData = $('#threatForm').serialize();
        if (window.DEBUG_MODE) {
        console.log('Form data:', formData);
        }

        var url = $('#threat-id').val() ?
            '{% url "edit_threat" threat_id=0 %}'.replace('0', $('#threat-id').val()) :
            '{% url "risk_assessment_config" %}';

        clearValidationErrors();

        $.ajax({
            url: url,
            type: 'POST',
            data: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': $('input[name=csrfmiddlewaretoken]').val()
            },
            success: function(result) {
                if (window.DEBUG_MODE) {
                console.log('Server response:', result);
                }
                if (result.status === 'success') {
                    threatModal.hide();
                    if (threatsTable) {
                    threatsTable.ajax.reload();
                    }
                    showAlert('success', result.message);
                    updateProbabilityVisual(result.probability);
                } else {
                    handleFormErrors(result.errors);
                }
            },
            error: function(xhr, status, error) {
                console.error('AJAX error:', xhr.responseText);
                try {
                    var response = JSON.parse(xhr.responseText);
                    showAlert('error', response.message);
                    handleFormErrors(response.errors);
                } catch (e) {
                    showAlert('error', 'An unexpected error occurred. Please try again.');
                }
            }
        });
    });
    }

    $('#threat-probability-scenario').change(function() {
        if (window.DEBUG_MODE) {
            console.log('Probability scenario changed to:', $(this).val());
        }
        updateProbabilityFields();
    });
    
    // Handle M and N input changes
    $('#threat-scenario-m, #threat-scenario-n').on('input', function() {
        var scenario = $('#threat-probability-scenario').val();
        if (window.DEBUG_MODE) {
            console.log('M/N input changed:', {
                scenario: scenario,
                m: $('#threat-scenario-m').val(),
                n: $('#threat-scenario-n').val()
            });
        }
        
        if (scenario && scenario !== 'manual' && scenario !== 'daily') {
            // Add a small delay to avoid too many requests
            clearTimeout(window.probabilityCalculationTimeout);
            window.probabilityCalculationTimeout = setTimeout(function() {
                calculateProbability();
            }, 500);
        }
    });
    
    $('#threat-probability').on('input', function() {
        var value = parseLocalizedNumber($(this).val());
        updateProbabilityVisual(value);
    });
    
    // Handle calculate probability button click
    $(document).on('click', '#calculate-probability-btn', function() {
        calculateProbability();
    });

    // --- Threat Translations: View/Edit modal (badge click) ---
    $(document).on('click', '.threat-translation-badge', function() {
        var threatId = $(this).data('threat-id');
        var countryId = $(this).data('country-id');
        var countryCode = $(this).data('country-code') || '';
        var countryName = $(this).data('country-name') || '';
        if (!threatId || !countryId) return;
        $('#viewThreatTranslationModal').data('viewThreatTranslationThreatId', threatId).data('viewThreatTranslationCountryId', countryId);
        $('#viewThreatTranslationCountryName').text(countryName || countryCode);
        $('#viewThreatTranslationCountryCode').text(countryCode);
        $('#viewThreatTranslationError').hide();
        $('#viewThreatTranslationNameLocal, #viewThreatTranslationDescription, #viewThreatTranslationRisks').val('');
        $.get('{% url "get_threat_translation_detail" %}', { threat_id: threatId, country_id: countryId })
            .done(function(d) {
                $('#viewThreatTranslationNameLocal').val(d.name_local || '');
                $('#viewThreatTranslationDescription').val(d.description || '');
                $('#viewThreatTranslationRisks').val(d.risks || '');
            })
            .fail(function(xhr) {
                var msg = (xhr.responseJSON && xhr.responseJSON.error) ? xhr.responseJSON.error : '{% trans "Failed to load translation" %}';
                $('#viewThreatTranslationError').text(msg).show();
            });
        var modalEl = document.getElementById('viewThreatTranslationModal');
        var modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        modal.show();
    });
    $('#viewThreatTranslationSaveBtn').on('click', function() {
        if (!window.userPermissions || !window.userPermissions.can_edit_config) return;
        var threatId = $('#viewThreatTranslationModal').data('viewThreatTranslationThreatId');
        var countryId = $('#viewThreatTranslationModal').data('viewThreatTranslationCountryId');
        if (!threatId || !countryId) return;
        var payload = {
            threat_id: parseInt(threatId, 10),
            country_id: parseInt(countryId, 10),
            name_local: $('#viewThreatTranslationNameLocal').val() || '',
            description: $('#viewThreatTranslationDescription').val() || '',
            risks: $('#viewThreatTranslationRisks').val() || ''
        };
        var $btn = $(this);
        $btn.prop('disabled', true);
        $('#viewThreatTranslationError').hide();
        $.ajax({
            url: '{% url "save_threat_translation" %}',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(payload),
            headers: { 'X-CSRFToken': $('input[name=csrfmiddlewaretoken]').val() },
            success: function(response) {
                $btn.prop('disabled', false);
                if (response.success) {
                    if (typeof showAlert === 'function') showAlert('success', '{% trans "Translation saved" %}');
                    if (threatsTable) threatsTable.ajax.reload();
                } else {
                    $('#viewThreatTranslationError').text(response.message || '{% trans "Failed to save" %}').show();
                }
            },
            error: function(xhr) {
                $btn.prop('disabled', false);
                var msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : (xhr.responseJSON && xhr.responseJSON.error) ? xhr.responseJSON.error : '{% trans "Error saving translation" %}';
                $('#viewThreatTranslationError').text(msg).show();
            }
        });
    });
    $('#viewThreatTranslationModal').on('hidden.bs.modal', function() {
        $('body').removeClass('modal-open').css({ overflow: '', paddingRight: '' });
        $('.modal-backdrop').remove();
    });

    // --- Translate Threat modal ---
    $('#translateThreatsBtn').on('click', function() {
        var $sel = $('#translateThreatThreat');
        $sel.find('option:not(:first)').remove();
        if (threatsTable) {
            var rows = threatsTable.rows().data();
            for (var i = 0; i < rows.length; i++) {
                var r = rows[i];
                var name = (r.name || '').length > 50 ? (r.name || '').substr(0, 50) + '...' : (r.name || 'ID ' + r.id);
                $sel.append($('<option></option>').val(r.id).text(name));
            }
        }
        $('#translateThreatPreviewSection').hide();
        $('#translateThreatSaveBtn').hide();
        $('#translateThreatErrorContainer').hide();
        $('#translateThreatCountry').val('');
        var modalEl = document.getElementById('translateThreatModal');
        var modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        modal.show();
    });
    $('#translateThreatModal').on('show.bs.modal', function() {
        $.get('{% url "get_threat_translation_countries" %}').done(function(response) {
            var $sel = $('#translateThreatCountry');
            $sel.find('option:not(:first)').remove();
            (response.countries || []).forEach(function(c) {
                $sel.append($('<option></option>').val(c.id).text((c.name || '') + ' (' + (c.code || '') + ')'));
            });
        });
    });
    $('#translateThreatGenerateBtn').on('click', function() {
        var threatId = $('#translateThreatThreat').val();
        var countryId = $('#translateThreatCountry').val();
        var method = $('input[name="translateThreatMethod"]:checked').val() || 'google';
        if (!threatId || !countryId) {
            $('#translateThreatErrorMessage').text('{% trans "Please select a threat and a country" %}');
            $('#translateThreatErrorContainer').show();
            return;
        }
        $('#translateThreatErrorContainer').hide();
        var $btn = $(this);
        $btn.prop('disabled', true);
        var url = '{% url "translate_threat_preview" %}';
        if (method === 'ai') {
            var provider = (typeof defaultAIProvider === 'string') ? defaultAIProvider : (typeof localStorage !== 'undefined' && localStorage.getItem('defaultAIProvider')) || 'claude';
            url += (url.indexOf('?') !== -1 ? '&' : '?') + 'provider=' + encodeURIComponent(provider);
        }
        $.ajax({
            url: url,
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ threat_id: parseInt(threatId, 10), country_id: parseInt(countryId, 10), translation_method: method }),
            headers: { 'X-CSRFToken': $('input[name=csrfmiddlewaretoken]').val() },
            success: function(response) {
                $btn.prop('disabled', false);
                if (response.success && response.preview) {
                    var p = response.preview;
                    $('#translateThreatPreviewNameLocal').val(p.name_local || '');
                    $('#translateThreatPreviewDescription').val(p.description || '');
                    $('#translateThreatPreviewRisks').val(p.risks || '');
                    $('#translateThreatPreviewSection').show();
                    $('#translateThreatSaveBtn').show();
                } else {
                    $('#translateThreatErrorMessage').text(response.message || '{% trans "Failed to generate preview" %}');
                    $('#translateThreatErrorContainer').show();
                }
            },
            error: function(xhr) {
                $btn.prop('disabled', false);
                var msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : '{% trans "Error generating translation preview" %}';
                $('#translateThreatErrorMessage').text(msg);
                $('#translateThreatErrorContainer').show();
            }
        });
    });
    $('#translateThreatSaveBtn').on('click', function() {
        var threatId = $('#translateThreatThreat').val();
        var countryId = $('#translateThreatCountry').val();
        if (!threatId || !countryId) return;
        var payload = {
            threat_id: parseInt(threatId, 10),
            country_id: parseInt(countryId, 10),
            name_local: $('#translateThreatPreviewNameLocal').val() || '',
            description: $('#translateThreatPreviewDescription').val() || '',
            risks: $('#translateThreatPreviewRisks').val() || ''
        };
        var $btn = $(this);
        $btn.prop('disabled', true);
        $.ajax({
            url: '{% url "save_threat_translation" %}',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(payload),
            headers: { 'X-CSRFToken': $('input[name=csrfmiddlewaretoken]').val() },
            success: function(response) {
                $btn.prop('disabled', false);
                if (response.success) {
                    if (typeof showAlert === 'function') showAlert('success', '{% trans "Translation saved" %}');
                    $('#translateThreatPreviewSection').hide();
                    $('#translateThreatSaveBtn').hide();
                    if (threatsTable) threatsTable.ajax.reload();
                } else {
                    $('#translateThreatErrorContainer').find('#translateThreatErrorMessage').text(response.message || '{% trans "Failed to save" %}');
                    $('#translateThreatErrorContainer').show();
                }
            },
            error: function(xhr) {
                $btn.prop('disabled', false);
                var msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : '{% trans "Error saving translation" %}';
                $('#translateThreatErrorMessage').text(msg);
                $('#translateThreatErrorContainer').show();
            }
        });
    });
    $('#translateThreatModal').on('hidden.bs.modal', function() {
        $('body').removeClass('modal-open').css({ overflow: '', paddingRight: '' });
        $('.modal-backdrop').remove();
    });

    function updateProbabilityFields() {
        var scenario = $('#threat-probability-scenario').val();
        
        if (window.DEBUG_MODE) {
            console.log('Updating probability fields for scenario:', scenario);
        }
        
        // Hide all sections first
        $('.scenario-params').addClass('d-none').removeClass('d-block');
        $('.manual-input-section').addClass('d-none').removeClass('d-block');
        
        // Reset probability field
        $('#threat-probability').prop('readonly', true);
        
        if (scenario === 'manual') {
            // Show manual input section
            $('.manual-input-section').removeClass('d-none').addClass('d-block');
            $('#threat-probability').prop('readonly', false);
            
            // Clear M and N values for manual input
            $('#threat-scenario-m').val('');
            $('#threat-scenario-n').val('');
            
            // Update help text
            $('#m-help-text').text('{% trans "Not applicable for manual input" %}');
            $('#n-help-text').text('{% trans "Not applicable for manual input" %}');
            $('#scenario-description').text('{% trans "Manual input mode - enter probability value directly" %}');
            
            if (window.DEBUG_MODE) {
                console.log('Manual input section shown');
            }
            
        } else if (scenario === 'daily') {
            // Daily scenario - no parameters needed
            $('#m-help-text').text('{% trans "Not applicable for daily scenario" %}');
            $('#n-help-text').text('{% trans "Not applicable for daily scenario" %}');
            $('#scenario-description').text('{% trans "Daily scenario - probability is automatically set to 100%" %}');
            
            // Clear M and N values for daily scenario
            $('#threat-scenario-m').val('');
            $('#threat-scenario-n').val('');
            
            calculateProbability();
            
            if (window.DEBUG_MODE) {
                console.log('Daily scenario - calculating probability');
            }
            
        } else if (scenario === 'm_in_n_days' || scenario === 'once_in_n_years' || scenario === 'm_in_n_years') {
            // Show scenario parameters
            $('.scenario-params').removeClass('d-none').addClass('d-block');
            
            // Show/hide M field based on scenario
            if (scenario === 'once_in_n_years') {
                $('#threat-scenario-m').closest('.col-md-6').hide();
                $('#threat-scenario-m').val('1'); // Set M to 1 for once_in_n_years
        } else {
                $('#threat-scenario-m').closest('.col-md-6').show();
            }
            
            // Update help text based on scenario
            if (scenario === 'm_in_n_days') {
                $('#m-help-text').text('{% trans "Number of occurrences" %}');
                $('#n-help-text').text('{% trans "Number of days" %}');
                $('#scenario-description').text('{% trans "M times in N days - probability = M/N (max 100%)" %}');
            } else if (scenario === 'once_in_n_years') {
                $('#m-help-text').text('{% trans "Not applicable (always 1)" %}');
                $('#n-help-text').text('{% trans "Number of years" %}');
                $('#scenario-description').text('{% trans "Once in N years - probability = 1/(N*365) (max 100%)" %}');
            } else if (scenario === 'm_in_n_years') {
                $('#m-help-text').text('{% trans "Number of occurrences" %}');
                $('#n-help-text').text('{% trans "Number of years" %}');
                $('#scenario-description').text('{% trans "M times in N years - probability = M/(N*365) (max 100%)" %}');
            }
            
            calculateProbability();
            
            if (window.DEBUG_MODE) {
                console.log('Scenario parameters shown for:', scenario);
            }
        } else {
            // No scenario selected
            if (window.DEBUG_MODE) {
                console.log('No scenario selected');
            }
        }
    }

    function calculateProbability() {
        var scenario = $('#threat-probability-scenario').val();
        var m = $('#threat-scenario-m').val();
        var n = $('#threat-scenario-n').val();

        if (window.DEBUG_MODE) {
            console.log('Calculating probability for scenario:', scenario, 'M:', m, 'N:', n);
        }

        if (scenario === 'manual') {
            if (window.DEBUG_MODE) {
                console.log('Manual scenario - no calculation needed');
            }
            return;
        }

        // Validate required fields based on scenario
        if (scenario === 'm_in_n_days' || scenario === 'm_in_n_years') {
            if (!m || !n) {
                showAlert('warning', '{% trans "Please enter both M and N values" %}');
                return;
            }
            if (parseInt(m) < 1 || parseInt(n) < 1) {
                showAlert('warning', '{% trans "M and N values must be at least 1" %}');
                return;
            }
        } else if (scenario === 'once_in_n_years') {
            if (!n) {
                showAlert('warning', '{% trans "Please enter N value" %}');
                return;
            }
            if (parseInt(n) < 1) {
                showAlert('warning', '{% trans "N value must be at least 1" %}');
            return;
            }
        }

        // Show loading state
        var $btn = $('#calculate-probability-btn');
        if ($btn.length === 0) {
            if (window.DEBUG_MODE) {
                console.log('Calculate probability button not found');
            }
            return;
        }
        
        var originalText = $btn.html();
        $btn.html('<i class="fas fa-spinner fa-spin me-1"></i>{% trans "Calculating..." %}');
        $btn.prop('disabled', true);

        $.get('{% url "calculate_probability" %}', {
            scenario: scenario,
            m: m,
            n: n
        }, function(data) {
            if (window.DEBUG_MODE) {
                console.log('Probability calculation response:', data);
            }
            
            if (data.error) {
                showAlert('error', data.error);
            } else {
                updateProbabilityVisual(data.probability);
                showAlert('success', '{% trans "Probability calculated successfully" %}: ' + (data.probability * 100).toFixed(2) + '%');
            }
        }).fail(function(jqXHR, textStatus, errorThrown) {
            console.error("AJAX request failed: " + textStatus, errorThrown);
            console.error("Response:", jqXHR.responseText);
            showAlert('error', '{% trans "Error calculating probability" %}');
        }).always(function() {
            // Restore button state
            $btn.html(originalText);
            $btn.prop('disabled', false);
        });
    }

    function updateProbabilityVisual(value) {
        if (window.DEBUG_MODE) {
        console.log('Updating probability visual:', value);
        }
        value = parseFloat(value);
        if (isNaN(value)) {
            if (window.DEBUG_MODE) {
            console.error('Invalid probability value:', value);
            }
            value = 0;
        }
        var percent = value * 100;
        $('#threatModal .probability-visual').css('width', percent + '%');
        $('#threat-probability').val(value.toFixed(4));
    }

    // Delete threat with permission check
    if (window.userPermissions && window.userPermissions.can_delete_config) {
        $(document).on('click', '.delete-threat', function() {
            var threatId = $(this).data('id');
            if (confirm('{% trans "Are you sure you want to delete this threat?" %}')) {
                $.ajax({
                    url: '{% url "delete_threat" threat_id=0 %}'.replace('0', threatId),
                    type: 'POST',
                    headers: {'X-CSRFToken': '{{ csrf_token }}'},
                    success: function(result) {
                        if (result.status === 'success') {
                            if (threatsTable) {
                            threatsTable.ajax.reload();
                            }
                            showAlert('success', '{% trans "Threat deleted successfully" %}');
                        } else {
                            showAlert('error', '{% trans "Error deleting threat" %}');
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('Error deleting threat:', error);
                        showAlert('error', '{% trans "Error deleting threat" %}');
                    }
                });
            }
        });
    }

    $('#translateBtn').click(function() {
        const categories = ['name', 'description', 'risks'];
        const langCodes = (window.VULNERABILITY_FORM_LANGUAGES || [{code:'uk'},{code:'ru'},{code:'en'}]).map(function(l){ return l.code; });

        categories.forEach(category => {
            let sourceText = '';
            let sourceLang = '';

            for (let i = 0; i < langCodes.length; i++) {
                const lang = langCodes[i];
                const $el = $('#threat-' + category + '-' + lang);
                if ($el.length) {
                    const fieldValue = ($el.val() || '').trim();
                    if (fieldValue !== '') {
                        sourceText = fieldValue;
                        sourceLang = lang;
                        break;
                    }
                }
            }

            if (sourceText === '') {
                console.log(`{% trans "No text to translate for" %} ${category}`);
                return;
            }

            const targetLangs = langCodes.filter(lang => lang !== sourceLang);

            targetLangs.forEach(targetLang => {
                $.ajax({
                    url: '{% url "translate_text" %}',
                    type: 'POST',
                    data: {
                        source_lang: sourceLang,
                        target_lang: targetLang,
                        text: sourceText,
                        csrfmiddlewaretoken: $('input[name=csrfmiddlewaretoken]').val()
                    },
                    success: function(response) {
                        if (response.translated_text) {
                            var $target = $('#threat-' + category + '-' + targetLang);
                            if ($target.length) $target.val(response.translated_text);
                        } else {
                            showAlert('error', `{% trans "Translation failed for" %} ${category} (${targetLang})`);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('Translation error:', error);
                        showAlert('error', `{% trans "Error occurred while translating" %} ${category} {% trans "to" %} ${targetLang}`);
                    }
                });
            });
        });
    });

    function clearValidationErrors() {
        $('.is-invalid').removeClass('is-invalid');
        $('.invalid-feedback').remove();
    }

    function handleFormErrors(errors) {
        for (var field in errors) {
            var $field = $('#threat-' + field.replace('_', '-'));
            if ($field.length) {
                $field.addClass('is-invalid');
                $field.after('<div class="invalid-feedback">' + errors[field].join(', ') + '</div>');
            }
        }
    }

            // Scroll to the top of the modal to show the error message
            $('#threatModal .modal-body').scrollTop(0);
});
