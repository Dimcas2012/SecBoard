<!-- SecBoard\SecBoard\templates\app_risk\modals\vuln_modal.html-->
{% load i18n %}

<div class="modal fade" id="vulnerabilityModal" tabindex="-1" aria-labelledby="vulnerabilityModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="vulnerabilityModalLabel">{% trans "Add/Edit Vulnerability" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="vulnerabilityForm">
                    {% csrf_token %}
                    <input type="hidden" id="vulnerabilityId" name="id">
                    <div class="mb-3">
                        <label for="assetGroup" class="form-label">{% trans "Asset Group" %}</label>
                        <select class="form-select" id="assetGroup" name="asset_group" required>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="assetType" class="form-label">{% trans "Asset Type" %}</label>
                        <select class="form-select" id="assetType" name="asset_type" required>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="scope" class="form-label">{% trans "Scope" %}</label>
                        <input type="text" class="form-control" id="scope" name="scope" required>
                    </div>
                    <div class="mb-3">
                        <label for="vulnerability" class="form-label">{% trans "Vulnerability" %}</label>
                        <textarea class="form-control" id="vulnerability" name="vulnerability" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">{% trans "Description" %}</label>
                        <div class="input-group">
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                            <button class="btn btn-outline-secondary" type="button" id="descriptionAiBtn">{% trans "Description AI" %}</button>
                        </div>
                        <div class="progress mb-2 d-none" id="descriptionAiProgress">
                            <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="threats" class="form-label">{% trans "Threats" %}</label>
                        <select class="form-select" id="threats" name="threats" multiple>
                            <!-- Options will be populated dynamically -->
                        </select>
                        <button class="btn btn-outline-secondary" type="button" id="analyzeThreatsBtn">{% trans "Threats AI" %}</button>
                    </div>
                    <div class="mb-3">
                        <label for="riskMitigation" class="form-label">{% trans "Risk Mitigation Controls" %}</label>
                        <div class="input-group">
                            <textarea class="form-control" id="riskMitigation" name="risk_mitigation_controls" rows="3"></textarea>
                            <button class="btn btn-outline-secondary" type="button" id="riskMitigationAiBtn">{% trans "Risk Mitigation Controls AI" %}</button>
                        </div>
                        <div class="progress mb-2 d-none" id="riskMitigationAiProgress">
                            <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="pciDss" class="form-label">{% trans "PCI DSS Requirement" %}</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="pciDss" name="pci_dss_requirement">
                            <button class="btn btn-outline-secondary" type="button" id="pciDssAiBtn">{% trans "PCI DSS AI" %}</button>
                        </div>
                        <div class="progress mb-2 d-none" id="pciDssAiProgress">
                            <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="iso27001" class="form-label">{% trans "ISO27001 Requirement" %}</label>
                        <div class="input-group">
                            <textarea class="form-control" id="iso27001" name="iso27001_requirement" rows="2"></textarea>
                            <button class="btn btn-outline-secondary" type="button" id="iso27001AiBtn">{% trans "ISO 27001 AI" %}</button>
                        </div>
                        <div class="progress mb-2 d-none" id="iso27001AiProgress">
                            <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="note" class="form-label">{% trans "Note" %}</label>
                        <div class="input-group">
                            <textarea class="form-control" id="note" name="note" rows="3"></textarea>
                            <button class="btn btn-outline-secondary" type="button" id="noteAiBtn">{% trans "Note AI" %}</button>
                        </div>
                        <div class="progress mb-2 d-none" id="noteAiProgress">
                            <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
                <button type="button" class="btn btn-primary" id="saveVulnerabilityBtn">{% trans "Save" %}</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteConfirmationModal" tabindex="-1" aria-labelledby="deleteConfirmationModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteConfirmationModalLabel">{% trans "Confirm Deletion" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {% trans "Are you sure you want to delete this vulnerability?" %}
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Cancel" %}</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">{% trans "Delete" %}</button>
            </div>
        </div>
    </div>
</div>
