<!-- SecBoard\SecBoard\templates\app_risk\vulnerabilities_scripts.html-->
{% load static %}
{% load i18n %}

<script>
// Define global variables and functions that need to be accessible from HTML
let vulnerabilityToDelete;
let vulnerabilitiesTable;

// Default language for vulnerability form (single set of fields)
var DEFAULT_VULN_LANG = 'en';
// Dynamic form languages (from settings.LANGUAGES, filtered by model support)
function getVulnFormLanguages() {
    if (window.VULNERABILITY_FORM_LANGUAGES && window.VULNERABILITY_FORM_LANGUAGES.length) {
        return window.VULNERABILITY_FORM_LANGUAGES;
    }
    return [{code: 'en', name: 'English'}, {code: 'uk', name: 'Ukrainian'}, {code: 'ru', name: 'Russian'}];
}
// Source language for AI (prefer 'en', else first configured)
function getVulnAiSourceLang() {
    const langs = getVulnFormLanguages();
    const en = langs.find(l => l.code === 'en');
    return en ? en.code : (langs[0] ? langs[0].code : 'en');
}

// Global function to get cookie by name 
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Global function to show alerts
function showAlert(type, message, timeout = 5000) {
    const alertHtml = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    `;
    const $alert = $(alertHtml);
    $('#alertContainer').append($alert);

    if (timeout) {
        setTimeout(() => {
            $alert.alert('close');
        }, timeout);
    }
}

// Global function for deleting vulnerability (called from HTML onclick)
function deleteVulnerability() {
    const id = vulnerabilityToDelete;
    if (!id) {
        showAlert('error', '{% trans "Invalid vulnerability ID" %}');
        return;
    }

    // Get current language from URL or use a default
    const urlPath = window.location.pathname;
    const langPrefix = urlPath.startsWith('/en/') ? 'en' : 
                      urlPath.startsWith('/ru/') ? 'ru' : 'uk';
    
    // Get CSRF token directly from the form
    const csrftoken = $('#deleteVulnerabilityForm input[name="csrfmiddlewaretoken"]').val();
    
    console.log("Using CSRF token from form:", csrftoken);
    console.log("Deleting vulnerability ID:", id);
    console.log("Using language prefix:", langPrefix);
    
    if (!csrftoken) {
        showAlert('error', '{% trans "CSRF token not found. Please refresh the page and try again." %}');
        return;
    }
    
    // Proceed with the AJAX request
    $.ajax({
        url: `/${langPrefix}/app_risk/delete_vulnerability/${id}/`,
        method: 'POST',
        headers: {
            'X-CSRFToken': csrftoken
        },
        success: function(response) {
            $('#deleteConfirmationModal').modal('hide');
            vulnerabilitiesTable.ajax.reload();
            showAlert('success', response.message || '{% trans "Vulnerability deleted successfully" %}');
        },
        error: function(xhr) {
            console.error("Error deleting vulnerability:", xhr.responseText);
            let errorMessage = '{% trans "Failed to delete vulnerability" %}';
            if (xhr.responseJSON && xhr.responseJSON.message) {
                errorMessage = xhr.responseJSON.message;
            }
            showAlert('error', errorMessage);
            $('#deleteConfirmationModal').modal('hide');
        }
    });
}

// Rest of code in document.ready
$(document).ready(function() {
    // Removing the redundant getCookie as it's now global
    /*function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }*/

    // Setup CSRF token for all AJAX requests
    $.ajaxSetup({
        beforeSend: function(xhr, settings) {
            if (!csrfSafeMethod(settings.type) && !this.crossDomain) {
                const csrftoken = $('meta[name=csrf-token]').attr('content') || getCookie('csrftoken') || $('[name=csrfmiddlewaretoken]').val();
                xhr.setRequestHeader('X-CSRFToken', csrftoken);
            }
        }
    });

    function csrfSafeMethod(method) {
        return (/^(GET|HEAD|OPTIONS|TRACE)$/i.test(method));
    }

    // Let's not redefine these as they're now global
    //let vulnerabilitiesTable;
    //let vulnerabilityToDelete;
    let currentLanguage = '{{ LANGUAGE_CODE }}';
    let defaultAIProvider = '{{ default_ai_provider }}' || 'claude'; // Default AI provider
    let currentGeneratedVulnerabilities = []; // Store generated vulnerabilities (Claude)
    let googleGeneratedVulnerabilities = []; // Store Google AI generated vulnerabilities
    let groqGeneratedVulnerabilities = []; // Store Groq AI generated vulnerabilities
    let deepseekGeneratedVulnerabilities = []; // Store DeepSeek AI generated vulnerabilities

    initializeSelect2();
    bindEventListeners();
    loadAssetGroups();
    loadThreats();
    initializeDefaultAIProvider();

    var vulnerabilitiesTabInitialized = false;

    function initVulnerabilitiesTabOnce() {
        if (vulnerabilitiesTabInitialized) {
            if (vulnerabilitiesTable && vulnerabilitiesTable.columns) {
                vulnerabilitiesTable.columns.adjust();
            }
            return;
        }
        vulnerabilitiesTabInitialized = true;
        initializeTreeFilter();
        initializeDataTable();
    }

    var vulnTabBtn = document.getElementById('vulnerabilities-tab');
    if (vulnTabBtn) {
        vulnTabBtn.addEventListener('shown.bs.tab', initVulnerabilitiesTabOnce);
    }
    if (document.getElementById('vulnerabilitiesConfig') &&
        document.getElementById('vulnerabilitiesConfig').classList.contains('show')) {
        initVulnerabilitiesTabOnce();
    }

    var clearVulnFiltersBtn = document.getElementById('clearVulnConfigFilters');
    if (clearVulnFiltersBtn) {
        clearVulnFiltersBtn.addEventListener('click', function(e) {
            e.preventDefault();
            $('#assetFilter').val('').trigger('change');
            $('[id^="searchVulnerabilities"]').val('');
            if (vulnerabilitiesTable) {
                vulnerabilitiesTable.search('').draw();
            }
        });
    }

    function initializeDefaultAIProvider() {
        // Check if there's a saved preference in localStorage
        const savedProvider = localStorage.getItem('defaultAIProvider');
        if (savedProvider) {
            defaultAIProvider = savedProvider;
            $('#defaultAIProvider').val(savedProvider);
        }

        // Save preference when changed
        $('#defaultAIProvider').on('change', function() {
            defaultAIProvider = $(this).val();
            localStorage.setItem('defaultAIProvider', defaultAIProvider);
            showAlert('info', '{% trans "Default AI provider set to" %} ' + $('#defaultAIProvider option:selected').text());
        });
    }

    function initializeSelect2() {
        if ($.fn.select2) {
            $('#vulnerabilityModal #assetGroup, #vulnerabilityModal #assetType, #vulnerabilityModal #threats').select2({
                theme: 'bootstrap-5',
                width: '100%'
            });
        } else {
            console.warn('Select2 is not available');
        }
    }

    function initializeDataTable() {

        if (!$(tableId).length) {

            return;
        }

            $(tableId).DataTable().destroy();
        }

        try {

                lengthChange: false,

                    data: function(d) {
                        d.language = currentLanguage;
                        d.assetFilter = $('#assetFilter').val();
                    },
                    dataSrc: function(data) {
                        updateDashboardStats(data);
                        return data.vulnerabilities;
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row) {
                            return '<input type="checkbox" class="vulnerability-checkbox" data-id="' + (row.id || '') + '">';
                        },
                        orderable: false,
                        width: "3%"
                    },
                    {
                        data: 'id',
                        render: function(data) {
                            return data || '';
                        },
                        width: "3%"
                    },
                    {
                        data: 'asset_group',
                        render: function(data) {
                            return data || '';
                        },
                        width: "8%"
                    },
                    {
                        data: 'scope',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display' && data.length > 30) {
                                return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'vulnerability',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display' && data.length > 30) {
                                return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'description',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display' && data.length > 30) {
                                return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'threats',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display') {
                                if (Array.isArray(data)) {
                                    const displayText = data.join(', ');
                                    if (displayText.length > 30) {
                                        return '<span title="' + escapeHtml(displayText) + '">' + displayText.substr(0, 30) + '...</span>';
                                    }
                                    return displayText;
                                }
                                if (data.length > 30) {
                                    return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                                }
                                return data;
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'risk_mitigation_controls',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display' && data.length > 30) {
                                return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'pci_dss_requirement',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display' && data.length > 30) {
                                return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'iso27001_requirement',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display' && data.length > 30) {
                                return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'note',
                        name: 'note',
                        render: function(data, type, row) {
                            if (data == null) return '';
                            if (type === 'display' && data.length > 30) {
                                return '<span title="' + escapeHtml(data) + '">' + data.substr(0, 30) + '...</span>';
                            }
                            return data;
                        },
                        width: "10%"
                    },
                    {
                        data: 'translations',
                        orderable: false,
                        render: function(data, type, row) {
                            if (type !== 'display' || !Array.isArray(data) || data.length === 0) {
                                return Array.isArray(data) && data.length > 0 ? data.map(function(t) { return t.country_code; }).join(', ') : '—';
                            }
                            return data.map(function(t) {
                                return '<span class="badge bg-secondary vuln-translation-badge me-1" style="cursor: pointer; font-size: 50%;" ' +
                                    'data-vuln-id="' + (row.id || '') + '" data-country-id="' + (t.country_id || '') + '" ' +
                                    'data-country-code="' + escapeHtml(t.country_code || '') + '" data-country-name="' + escapeHtml(t.country_name || '') + '" ' +
                                    'title="' + escapeHtml(t.country_name || t.country_code || '') + '">' + escapeHtml(t.country_code || '') + '</span>';
                            }).join('');
                        },
                        width: "8%"
                    },
                    {
                        data: null,
                        render: function(data, type, row) {
                            let buttons = '';
                            if (window.userPermissions && window.userPermissions.can_edit_config) {
                                buttons += '<button class="btn btn-sm btn-outline-primary btn-icon-action edit-vulnerability" data-id="' + (row.id || '') + '" title="{% trans "Edit" %}"><i class="bi bi-pencil"></i></button> ';
                            }
                            if (window.userPermissions && window.userPermissions.can_delete_config) {
                                buttons += '<button class="btn btn-sm btn-outline-danger btn-icon-action delete-vulnerability" data-id="' + (row.id || '') + '" title="{% trans "Delete" %}"><i class="bi bi-trash"></i></button>';
                            }
                            return buttons;
                        },
                        width: "6%"
                    }
                ],
                language: getDataTablesLanguage(),
                scrollX: true,
                scrollCollapse: true,
                autoWidth: false,
                initComplete: function() {
                    if (window.initRiskDataTablePagination) {
                        window.initRiskDataTablePagination({
                            api: this.api(),
                            containerId: 'vulnerabilitiesTable{{ vulnerabilities_context|default:"Main" }}Pagination',
                            paginationAriaLabel: '{% trans "Vulnerabilities pagination" %}',
                            labels: {
                                showing: '{% trans "Showing" %}',
                                of: '{% trans "of" %}',
                                items: '{% trans "records" %}',
                                perPage: '{% trans "Per page" %}'
                            }
                        });
                    }
                },
                drawCallback: function() {
                    // Initialize tooltips after table is drawn using our safe function
                    initializeTooltipsAndPopovers();
                    afterDataTablesInit();
                }
            });
            console.log('DataTable initialized successfully');
        } catch (error) {
            console.error('Error initializing DataTable:', error);
            showAlert('error', '{% trans "Error initializing table. Please try refreshing the page." %}');
        }
    }

    function getDataTablesLanguage() {
        const languages = {
            'en': { url: 'https://cdn.datatables.net/plug-ins/1.10.24/i18n/English.json' },
            'uk': { url: 'https://cdn.datatables.net/plug-ins/1.10.24/i18n/Ukrainian.json' },
            'ru': { url: 'https://cdn.datatables.net/plug-ins/1.10.24/i18n/Russian.json' },
            'de': { url: 'https://cdn.datatables.net/plug-ins/1.10.24/i18n/German.json' },
            'fr': { url: 'https://cdn.datatables.net/plug-ins/1.10.24/i18n/French.json' },
            'es': { url: 'https://cdn.datatables.net/plug-ins/1.10.24/i18n/Spanish.json' },
            'pl': { url: 'https://cdn.datatables.net/plug-ins/1.10.24/i18n/Polish.json' }
        };

        const fallbackLanguage = {
            "emptyTable": "{% trans 'No data available in table' %}",
            "info": "{% trans 'Showing _START_ to _END_ of _TOTAL_ entries' %}",
            "infoEmpty": "{% trans 'Showing 0 to 0 of 0 entries' %}",
            "infoFiltered": "{% trans '(filtered from _MAX_ total entries)' %}",
            "lengthMenu": "{% trans 'Show _MENU_ entries' %}",
            "loadingRecords": "{% trans 'Loading...' %}",
            "processing": "{% trans 'Processing...' %}",
            "search": "{% trans 'Search:' %}",
            "zeroRecords": "{% trans 'No matching records found' %}",
            "paginate": {
                "first": "{% trans 'First' %}",
                "last": "{% trans 'Last' %}",
                "next": "{% trans 'Next' %}",
                "previous": "{% trans 'Previous' %}"
            }
        };

        if (languages.hasOwnProperty(currentLanguage)) {
            return {
                url: languages[currentLanguage].url,
                error: function () {
                    console.warn('Failed to load language file for DataTables. Using fallback language.');
                    return fallbackLanguage;
                }
            };
        } else {
            if (window.DEBUG_MODE) {
                console.log('DataTables: Language "' + currentLanguage + '" has no CDN file, using translated fallback.');
            }
            return fallbackLanguage;
        }
    }

    function initializeTreeFilter() {
        // Show loading indicator in the select
        $('#assetFilter').html('<option value="">{% trans "Loading..." %}</option>');
        
        $.ajax({
            url: '{% url "get_asset_groups_and_types" %}',
            method: 'GET',
            data: { language: currentLanguage },
            success: function(response) {
                const treeData = transformDataToTreeStructure(response);
                
                // Initialize select2 with the tree data
                $('#assetFilter').select2({
                    theme: 'bootstrap-5',
                    width: '100%',
                    placeholder: '{% trans "Select Asset Group/Type" %}',
                    allowClear: true,
                    data: treeData,
                    templateResult: formatAssetOption,
                    escapeMarkup: function(markup) {
                        return markup;
                    }
                }).on('change', function() {
                    const selectedValue = $(this).val();
                    const selectedText = $(this).find('option:selected').text();
                    
                    // Update the filter label
                    if (selectedValue) {
                        $('#currentFilterText').text(selectedText);
                        $('#currentFilterLabel').show();
                    } else {
                        $('#currentFilterLabel').hide();
                    }
                    
                    if (vulnerabilitiesTable) {
                        vulnerabilitiesTable.ajax.reload();
                    }
                });
                
                // Handle clear filter button
                $('#clearAssetFilter').on('click', function() {
                    $('#assetFilter').val('').trigger('change');
                });
                
                console.log('Asset filter initialized with', treeData.length - 1, 'groups');
            },
            error: function(xhr, status, error) {
                console.error("Error loading asset groups and types:", error);
                showAlert('error', '{% trans "Failed to load asset groups and types" %}');
                
                // Reset the select with just the "All" option
                $('#assetFilter').html('<option value="">{% trans "All" %}</option>');
            }
        });
    }

    function transformDataToTreeStructure(data) {
        const treeData = [{
            id: '',
            text: '{% trans "All" %}',
            selected: true
        }];

        if (data.groups && Array.isArray(data.groups)) {
            if (data.groups.length === 0) {
                console.log('No groups with vulnerabilities found');
                showAlert('info', '{% trans "No asset groups with vulnerabilities found" %}');
            }
            
            data.groups.forEach(group => {
                if (group.name && (group.types?.length > 0 || group.id)) {
                    const groupNode = {
                        id: `group_${group.id}`,  // Changed format to match backend
                        text: group.name,
                        children: []
                    };

                    if (group.types && Array.isArray(group.types)) {
                        group.types.forEach(type => {
                            // Use the name property directly as it's already localized by the backend
                            const typeName = type.name || '';
                            if (typeName && typeName !== 'Undefined') {
                                groupNode.children.push({
                                    id: `type_${type.id}`,  // Changed format to match backend
                                    text: typeName
                                });
                            }
                        });
                    }

                    if (groupNode.children.length > 0 || group.id) {
                        treeData.push(groupNode);
                    }
                }
            });
        } else {
            console.error('Invalid data structure received from server:', data);
            showAlert('error', '{% trans "Failed to load asset groups and types" %}');
        }

        return treeData;
    }


    function formatAssetOption(asset) {
        if (!asset.id) {
            return asset.text;
        }

        // Format for groups (bold text)
        if (asset.children) {
            return $('<span class="fw-bold"><i class="fas fa-folder me-1"></i>' + asset.text + '</span>');
        }
        
        // Format for types (with indent and icon)
        return $('<span class="ps-3"><i class="fas fa-file me-1"></i>' + asset.text + '</span>');
    }



    function bindEventListeners() {
        // Main buttons with permission checks
        if (window.userPermissions && window.userPermissions.can_add_config) {
            $('#addVulnerabilityBtn').on('click', showAddVulnerabilityModal);
            $('#emptyStateAddBtn').on('click', showAddVulnerabilityModal);
        }
        
        if (window.userPermissions && window.userPermissions.can_edit_config) {
            $(document).on('click', '[id^="vulnerabilitiesTable"] .edit-vulnerability', showEditVulnerabilityModal);
            $('#saveVulnerabilityBtn').on('click', saveVulnerability);
        }
        
        if (window.userPermissions && window.userPermissions.can_delete_config) {
            $(document).on('click', '[id^="vulnerabilitiesTable"] .delete-vulnerability', showDeleteConfirmationModal);
        }
        $(document).on('click', '.vuln-translation-badge', function() {
            const vulnId = $(this).data('vuln-id');
            const countryId = $(this).data('country-id');
            const countryCode = $(this).data('country-code') || '';
            const countryName = $(this).data('country-name') || '';
            if (!vulnId || !countryId) return;
            $('#viewTranslationModal').data('viewTranslationVulnId', vulnId).data('viewTranslationCountryId', countryId);
            $('#viewTranslationCountryName').text(countryName || countryCode);
            $('#viewTranslationCountryCode').text(countryCode);
            $('#viewTranslationError').hide();
            $('#viewTranslationContent').show();
            $('#viewTranslationNameLocal, #viewTranslationDescription, #viewTranslationScope, #viewTranslationRiskMitigation, #viewTranslationPciDss, #viewTranslationIso27001, #viewTranslationNote').val('');
            $.ajax({
                url: '{% url "get_vulnerability_translation_detail" %}',
                method: 'GET',
                data: { vulnerability_id: vulnId, country_id: countryId },
                success: function(d) {
                    $('#viewTranslationNameLocal').val(d.name_local || '');
                    $('#viewTranslationDescription').val(d.description || '');
                    $('#viewTranslationScope').val(d.scope || '');
                    $('#viewTranslationRiskMitigation').val(d.risk_mitigation_controls || '');
                    $('#viewTranslationPciDss').val(d.pci_dss_requirement || '');
                    $('#viewTranslationIso27001').val(d.iso27001_requirement || '');
                    $('#viewTranslationNote').val(d.note || '');
                },
                error: function(xhr) {
                    const msg = (xhr.responseJSON && xhr.responseJSON.error) ? xhr.responseJSON.error : '{% trans "Failed to load translation" %}';
                    $('#viewTranslationError').text(msg).show();
                    $('#viewTranslationContent').hide();
                }
            });
            const modalEl = document.getElementById('viewTranslationModal');
            const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
            modal.show();
        });
        $('#viewTranslationSaveBtn').on('click', function() {
            if (!window.userPermissions || !window.userPermissions.can_edit_config) return;
            const vulnId = $('#viewTranslationModal').data('viewTranslationVulnId');
            const countryId = $('#viewTranslationModal').data('viewTranslationCountryId');
            if (!vulnId || !countryId) return;
            const payload = {
                vulnerability_id: parseInt(vulnId, 10),
                country_id: parseInt(countryId, 10),
                name_local: $('#viewTranslationNameLocal').val() || '',
                description: $('#viewTranslationDescription').val() || '',
                scope: $('#viewTranslationScope').val() || '',
                risk_mitigation_controls: $('#viewTranslationRiskMitigation').val() || '',
                pci_dss_requirement: $('#viewTranslationPciDss').val() || '',
                iso27001_requirement: $('#viewTranslationIso27001').val() || '',
                note: $('#viewTranslationNote').val() || ''
            };
            const $btn = $(this);
            $btn.prop('disabled', true);
            $('#viewTranslationError').hide();
            $.ajax({
                url: '{% url "save_vulnerability_translation" %}',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                headers: {'X-CSRFToken': getCookie('csrftoken')},
                success: function(response) {
                    $btn.prop('disabled', false);
                    if (response.success) {
                        showAlert('success', '{% trans "Translation saved" %}');
                        if (typeof vulnerabilitiesTable !== 'undefined' && vulnerabilitiesTable) vulnerabilitiesTable.ajax.reload();
                    } else {
                        $('#viewTranslationError').text(response.message || '{% trans "Failed to save" %}').show();
                    }
                },
                error: function(xhr) {
                    $btn.prop('disabled', false);
                    const msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : (xhr.responseJSON && xhr.responseJSON.error) ? xhr.responseJSON.error : '{% trans "Error saving translation" %}';
                    $('#viewTranslationError').text(msg).show();
                }
            });

    // Function to safely initialize tooltips and popovers
    function initializeTooltipsAndPopovers() {
        // First, dispose any existing tooltips
        $('[data-bs-toggle="tooltip"]').each(function() {
            try {
                const tooltip = bootstrap.Tooltip.getInstance(this);
                if (tooltip) {
                    tooltip.dispose();
                }
            } catch (error) {
                console.warn('Error disposing tooltip:', error);
            }
        });
        
        // Initialize tooltips
        $('[data-bs-toggle="tooltip"]').tooltip();
        
        // Dispose any existing popovers
        $('[data-bs-toggle="popover"]').each(function() {
            try {
                const popover = bootstrap.Popover.getInstance(this);
                if (popover) {
                    popover.dispose();
                }
            } catch (error) {
                console.warn('Error disposing popover:', error);
            }
        });
        
        // Initialize popovers
        $('[data-bs-toggle="popover"]').popover();
    }

    function generateVulnerabilities() {
        const assetGroup = $('#aiAssetGroup').val();
        const assetType = $('#aiAssetType').val();
        const hint = $('#aiPromptHint').val().trim();

        // Hide any previous error messages
        $('#aiErrorContainer').hide();
        $('#aiErrorMessage').text('');

        if (!assetGroup || !assetType) {
            showAlert('error', '{% trans "Please select both Asset Group and Asset Type" %}');
            // Show error in the modal
            $('#aiErrorMessage').text('{% trans "Please select both Asset Group and Asset Type" %}');
            $('#aiErrorContainer').show();
            return;
        }

        $('#generateVulnerabilities').prop('disabled', true).html(
            '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> {% trans "Generating..." %}'
        );
        
        const provider = defaultAIProvider;
        const providerName = provider.charAt(0).toUpperCase() + provider.slice(1);
        showAlert('info', `{% trans "Generating vulnerabilities with" %} ${providerName}. {% trans "This may take a few moments..." %}`);

        // Use the selected AI provider from the dropdown
        const endpoint = '{% url "generate_vulnerabilities_ai" %}' + 
            (provider !== 'claude' ? '?provider=' + provider : '');

        $.ajax({
            url: endpoint,
            method: 'POST',
            data: JSON.stringify({ 
                asset_group: assetGroup, 
                asset_type: assetType,
                hint: hint
            }),
            contentType: 'application/json',
            headers: {'X-CSRFToken': getCookie('csrftoken')},
            success: function(response) {
                if (response.vulnerabilities && response.vulnerabilities.length > 0) {
                    // Store vulnerabilities in the appropriate global variable based on the provider
                    if (provider === 'google') {
                        googleGeneratedVulnerabilities = response.vulnerabilities;
                    } else if (provider === 'groq') {
                        groqGeneratedVulnerabilities = response.vulnerabilities;
                    } else if (provider === 'deepseek') {
                        deepseekGeneratedVulnerabilities = response.vulnerabilities;
                    } else {
                        // Default to Claude
                        currentGeneratedVulnerabilities = response.vulnerabilities;
                    }
                    
                    // Display the vulnerabilities - ensures the UI is updated
                    displayGeneratedVulnerabilities(response.vulnerabilities);
                    showAlert('success', response.message || `{% trans "Vulnerabilities generated successfully with" %} ${providerName}`);
                    // Hide error container if it was previously shown
                    $('#aiErrorContainer').hide();
                } else {
                    // Show error when no vulnerabilities are returned
                    const errorMsg = response.error || response.message || '{% trans "No vulnerabilities were generated. The AI response was empty or invalid." %}';
                    showAlert('error', errorMsg);
                    
                    // Show error in the modal
                    $('#aiErrorMessage').text(errorMsg);
                    $('#aiErrorContainer').show();
                    
                    $('#aiGeneratedVulnerabilities tbody').html(
                        '<tr><td colspan="3" class="text-center text-danger">{% trans "No vulnerabilities were generated. Please try again or use a different AI provider." %}</td></tr>'
                    );
                }
            },
            error: function(xhr, status, error) {
                console.error(`Error generating vulnerabilities with ${providerName}:`, error);
                let errorMessage = `{% trans "Failed to generate vulnerabilities with" %} ${providerName}`;
                if (xhr.responseJSON && xhr.responseJSON.error) {
                    errorMessage += ': ' + xhr.responseJSON.error;
                }
                
                // Show error in the modal
                $('#aiErrorMessage').text(errorMessage);
                $('#aiErrorContainer').show();
                
                showAlert('error', errorMessage);
                $('#aiGeneratedVulnerabilities tbody').html(
                    '<tr><td colspan="3" class="text-center text-danger">' + errorMessage + '</td></tr>'
                );
            },
            complete: function() {
                $('#generateVulnerabilities').prop('disabled', false).html('{% trans "Generate" %}');
            }
        });
    }

    function displayGeneratedVulnerabilities(vulnerabilities) {
        const tbody = $('#aiGeneratedVulnerabilities tbody');
        tbody.empty();
        
        // Update UI to show which AI provider is being used
        const providerName = defaultAIProvider.charAt(0).toUpperCase() + defaultAIProvider.slice(1);
        $('#aiResultsTitle').text(`{% trans "Generated Vulnerabilities" %} (${providerName})`);
        
        // Store vulnerabilities in the appropriate global variable based on the provider
        // This is a fallback in case the calling function didn't already set it
        if (defaultAIProvider === 'google') {
            googleGeneratedVulnerabilities = vulnerabilities;
        } else if (defaultAIProvider === 'groq') {
            groqGeneratedVulnerabilities = vulnerabilities;
        } else if (defaultAIProvider === 'deepseek') {
            deepseekGeneratedVulnerabilities = vulnerabilities;
        } else {
            // Default to Claude
            currentGeneratedVulnerabilities = vulnerabilities;
        }
        
        const langConfig = getVulnFormLanguages();
        let withTranslations = 0;
        vulnerabilities.forEach(vuln => {
            const hasTranslation = langConfig.some(lang =>
                (vuln['vulnerability_' + lang.code] && vuln['vulnerability_' + lang.code].length > 0) ||
                (vuln['scope_' + lang.code] && vuln['scope_' + lang.code].length > 0)
            );
            if (hasTranslation && langConfig.length > 1) withTranslations++;
        });
        const countEl = $('#aiResultsCount');
        if (countEl.length) countEl.text(`${vulnerabilities.length}${langConfig.length > 1 ? ' (' + withTranslations + ' {% trans "with translations" %})' : ''}`);
        vulnerabilities.forEach(function(vuln, index) {
            const parts = [], scopeParts = [];
            langConfig.forEach(function(lang, i) {
                const v = vuln['vulnerability_' + lang.code] || (lang.code === 'en' ? vuln.vulnerability : null);
                const s = vuln['scope_' + lang.code] || (lang.code === 'en' ? vuln.scope : null);
                if (v) parts.push(i ? '<span class="text-muted small">' + lang.name + ': ' + v + '</span>' : v);
                if (s) scopeParts.push(i ? '<span class="text-muted small">' + lang.name + ': ' + s + '</span>' : s);
            });
            const row = `
                <tr>
                    <td><input type="checkbox" class="generated-vulnerability-checkbox" data-index="${index}"></td>
                    <td>${parts.join('<br>') || '-'}</td>
                    <td>${scopeParts.join('<br>') || '-'}</td>
                </tr>
            `;
            tbody.append(row);
        });
    }

    function saveGeneratedVulnerabilities() {
        const selectedIndices = [];
        $('.generated-vulnerability-checkbox:checked').each(function() {
            selectedIndices.push($(this).data('index'));
        });

        if (selectedIndices.length === 0) {
            showAlert('warning', '{% trans "Please select at least one vulnerability to save" %}');
            return;
        }

        // Get the selected vulnerabilities from the appropriate global variable based on the current AI provider
        const selectedVulnerabilities = selectedIndices.map(index => {
            // Determine which global variable to use based on the current AI provider
            let vuln;
            if (defaultAIProvider === 'google') {
                vuln = googleGeneratedVulnerabilities[index];
            } else if (defaultAIProvider === 'groq') {
                vuln = groqGeneratedVulnerabilities[index];
            } else if (defaultAIProvider === 'deepseek') {
                vuln = deepseekGeneratedVulnerabilities[index]; 
            } else {
                // Default to Claude
                vuln = currentGeneratedVulnerabilities[index];
            }
            
            // Pass through all language fields (backend handles dynamic languages)
            const langCodes = getVulnFormLanguages().map(l => l.code);
            const result = {};
            langCodes.forEach(lang => {
                result['vulnerability_' + lang] = vuln['vulnerability_' + lang] || (lang === 'en' ? vuln.vulnerability : '') || '';
                result['scope_' + lang] = vuln['scope_' + lang] || (lang === 'en' ? vuln.scope : '') || '';
            });
            return result;
        });

        console.log(`Saving selected vulnerabilities with ${defaultAIProvider}:`, selectedVulnerabilities);
        
        const data = {
            asset_group: $('#aiAssetGroup').val(),
            asset_type: $('#aiAssetType').val(),
            vulnerabilities: selectedVulnerabilities
        };

        $.ajax({
            url: "{% url 'save_generated_vulnerabilities' %}",
            method: 'POST',
            data: JSON.stringify(data),
            contentType: 'application/json',
            headers: {'X-CSRFToken': getCookie('csrftoken')},
            success: function(response) {
                if (response.success) {
                    showAlert('success', '{% trans "Vulnerabilities saved successfully" %}');
                    $('#addVulnerabilityAIModal').modal('hide');
                    vulnerabilitiesTable.ajax.reload();
                } else {
                    showAlert('error', response.error || '{% trans "Failed to save vulnerabilities" %}');
                }
            },
            error: function(xhr, status, error) {
                console.error("Error saving vulnerabilities:", error);
                showAlert('error', '{% trans "Failed to save vulnerabilities" %}');
            }
        });
    }

                formData['risk_mitigation_controls_' + lang] = '';
                formData['pci_dss_requirement_' + lang] = '';
                formData['iso27001_requirement_' + lang] = '';
                formData['note_' + lang] = '';
            }
        });

        const provider = (typeof defaultAIProvider === 'string' ? defaultAIProvider : null) || ($('#defaultAIProvider').length ? $('#defaultAIProvider').val() : null) || (typeof localStorage !== 'undefined' && localStorage.getItem('defaultAIProvider')) || 'claude';
        const endpoint = '{% url "analyze_threats_ai" %}' + 
            (provider !== 'claude' ? '?provider=' + encodeURIComponent(provider) : '');

        $.ajax({
            url: endpoint,
            method: 'POST',
            data: JSON.stringify(formData),
            contentType: 'application/json',
            headers: {'X-CSRFToken': getCookie('csrftoken')},
            success: function(response) {
                if (response.success && response.threats && response.threats.length > 0) {
                    $('#vulnerabilityModal #threats').val(response.threats).trigger('change');
                    showAlert('success', '{% trans "Threats analyzed and selected successfully" %}');
                } else if (response.success && (response.message || !response.threats || response.threats.length === 0)) {
                    $('#vulnerabilityModal #threats').val(null).trigger('change');

                let errorMessage = '{% trans "Failed to analyze threats with AI" %}';
                if (xhr.responseJSON && xhr.responseJSON.error) {
                    errorMessage += ': ' + xhr.responseJSON.error;
                }

            }

    function analyzeSelectedVulnerabilities() {
        const selectedIds = $('.vulnerability-checkbox:checked').map(function() {
            return $(this).data('id');
        }).get();

        if (selectedIds.length === 0) {
            showAlert('warning', '{% trans "Please select at least one vulnerability to analyze" %}');
            return;
        }

        const $progressBar = $('#aiAnalysisProgress');
        const $progressBarInner = $progressBar.find('.progress-bar');
        $progressBar.show();
        $progressBarInner.css('width', '0%').attr('aria-valuenow', 0).text('0%');

        $('#analyzeSelectedVulnerabilities').prop('disabled', true);

        let processed = 0;
        let successful = 0;
        const total = selectedIds.length;

        function updateProgress() {
            const percentage = Math.round((processed / total) * 100);
            $progressBarInner.css('width', percentage + '%').attr('aria-valuenow', percentage).text(percentage + '%');
        }

        function analyzeNext(index) {
            if (index >= selectedIds.length) {
                if (successful === total) {
                    showAlert('success', '{% trans "All vulnerabilities analyzed successfully" %}');
                } else if (successful > 0) {
                    showAlert('warning', `{% trans "Analyzed" %} ${successful} {% trans "of" %} ${total} {% trans "vulnerabilities successfully" %}`);
                } else {
                    showAlert('error', '{% trans "Failed to analyze any vulnerabilities" %}');
                }
                vulnerabilitiesTable.ajax.reload();
                $progressBar.hide();
                $('#analyzeSelectedVulnerabilities').prop('disabled', false);
                return;
            }

            const id = selectedIds[index];
            // Use the selected AI provider
            const endpoint = '{% url "analyze_multiply_threats_ai" vulnerability_id=0 %}'.replace('0', id) + 
                (defaultAIProvider !== 'claude' ? '?provider=' + defaultAIProvider : '');
                
            $.ajax({
                url: endpoint,
                method: 'POST',
                headers: {'X-CSRFToken': getCookie('csrftoken')},
                success: function(response) {
                    if (response.success) {
                        successful++;
                    } else {
                        console.error(`Error analyzing vulnerability ${id}:`, response.message);
                    }
                    processed++;
                    updateProgress();
                    analyzeNext(index + 1);
                },
                error: function(xhr, status, error) {
                    console.error(`Error analyzing vulnerability ${id}:`, error);
                    let errorMessage = '{% trans "Failed to analyze vulnerability" %}';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        errorMessage += ': ' + xhr.responseJSON.message;
                    }
                    showAlert('error', errorMessage);
                    processed++;
                    updateProgress();
                    analyzeNext(index + 1);
                }
            });
        }

        analyzeNext(0);
    }

    /**
     * Decode HTML entities and convert markdown to plain text for display in form fields.
     * e.g. "&amp;" -> "&", "**Additional Recommendations:**" -> "Additional Recommendations:"
     * List items "* **Item:**" -> "• Item:"
     */
    function decodeValueForDisplay(str) {
        if (str == null || str === '') return '';
        str = String(str);
        var textarea = document.createElement('textarea');
        textarea.innerHTML = str;
        str = textarea.value;
        str = str.replace(/\*\*([^*]*)\*\*/g, '$1');
        str = str.replace(/\*([^*]*)\*/g, '$1');
        str = str.replace(/^\s*\*\s+/gm, '• ');
        str = str.replace(/^#+\s*/gm, '');
        return str;
    }

    function generateWithAI(type, generationFunction) {
        const progressBar = $(`#${type}AiProgress`);
        const button = $(`#${type}AiBtn`);

        progressBar.removeClass('d-none');
        button.prop('disabled', true);

        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            if (progress > 90) clearInterval(interval);
            updateProgressBar(progressBar, progress);
        }, 300);

        generationFunction()
            .then(() => {
                clearInterval(interval);
                updateProgressBar(progressBar, 100);
                setTimeout(() => {
                    progressBar.addClass('d-none');
                    button.prop('disabled', false);
                }, 500);
            })
            .catch((error) => {
                clearInterval(interval);
                updateProgressBar(progressBar, 0);
                progressBar.addClass('d-none');
                button.prop('disabled', false);
                console.error(`Error in ${type} AI generation:`, error);
                showAlert('error', `{% trans "Failed to generate" %} ${type}`);
            });

                // Store the title attribute
                const title = $this.attr('title');
                // Remove the element from DOM temporarily
                const parent = $this.parent();
                const next = $this.next();
                $this.detach();
                // Reattach the element
                if (next.length) {
                    next.before($this);
                } else {
                    parent.append($this);
                }
                // Restore the title attribute
                if (title) {
                    $this.attr('title', title);
                }
            } catch (error) {
                console.warn('Error refreshing tooltip element:', error);
            }
        });
        
        // Re-initialize tooltips and popovers properly
        initializeTooltipsAndPopovers();
    }

    // AI operations handler
    function performAIOperation(operationType) {
        const selectedIds = $('.vulnerability-checkbox:checked').map(function() {
            return $(this).data('id');
        }).get();
        
        if (selectedIds.length === 0) {
            showAlert('warning', '{% trans "Please select at least one vulnerability" %}');
            return;
        }
        
        // Show confirmation dialog based on operation type
        let confirmMessage = '';
        let endpoint = '';
        
        switch(operationType) {
            case 'description':
                confirmMessage = '{% trans "Generate descriptions for selected vulnerabilities?" %}';
                endpoint = '{% url "generate_description_ai" %}';
                break;
            case 'risk_mitigation':
                confirmMessage = '{% trans "Generate risk mitigation controls for selected vulnerabilities?" %}';
                endpoint = '{% url "generate_risk_mitigation_ai" %}';
                break;
            case 'pci_dss':
                confirmMessage = '{% trans "Generate PCI DSS requirements for selected vulnerabilities?" %}';
                endpoint = '{% url "search_pcidss_requirement" %}';
                break;
            case 'iso27002':
                confirmMessage = '{% trans "Generate ISO 27002 controls for selected vulnerabilities?" %}';
                endpoint = '{% url "search_iso27001_requirement" %}';
                break;
            case 'note':
                confirmMessage = '{% trans "Generate notes for selected vulnerabilities?" %}';
                endpoint = '{% url "generate_note_ai" %}';
                break;
            default:
                showAlert('error', '{% trans "Unknown operation type" %}');
                return;
        }
        
        if (confirm(confirmMessage)) {
            // Show progress bar
            $('#aiAnalysisProgress').show();
            const progressBar = $('#aiAnalysisProgress .progress-bar');
            progressBar.width('10%').attr('aria-valuenow', 10).text('10%');
            
            const aiProvider = $('#defaultAIProvider').val();
            const totalItems = selectedIds.length;
            let processedItems = 0;
            
            // Process each vulnerability sequentially to avoid overloading the server
            function processNextItem(index) {
                if (index >= selectedIds.length) {
                    // All items processed
                    progressBar.width('100%').attr('aria-valuenow', 100).text('100%');
                    setTimeout(function() {
                        $('#aiAnalysisProgress').hide();
                        vulnerabilitiesTable.ajax.reload();
                        showAlert('success', '{% trans "AI operation completed successfully" %}');
                    }, 1000);
                    return;
                }
                
                const vulnerabilityId = selectedIds[index];
                
                $.ajax({
                    url: endpoint,
                    method: 'POST',
                    data: JSON.stringify({
                        vulnerability_id: vulnerabilityId,
                        ai_provider: aiProvider
                    }),
                    contentType: 'application/json',
                    headers: {'X-CSRFToken': getCookie('csrftoken')},
                    success: function(response) {
                        processedItems++;
                        const progress = Math.round((processedItems / totalItems) * 100);
                        progressBar.width(progress + '%').attr('aria-valuenow', progress).text(progress + '%');
                        
                        // Process next item
                        processNextItem(index + 1);
                    },
                    error: function(xhr, status, error) {
                        console.error(`Error processing vulnerability ${vulnerabilityId}:`, error);
                        processedItems++;
                        const progress = Math.round((processedItems / totalItems) * 100);
                        progressBar.width(progress + '%').attr('aria-valuenow', progress).text(progress + '%');
                        
                        // Continue with next item despite error
                        processNextItem(index + 1);
                    }
                });
            }
            
            // Start processing
            processNextItem(0);
        }
    }

                    const p = response.preview;
                    $('#translateAiPreviewNameLocal').val(p.name_local || '');
                    $('#translateAiPreviewDescription').val(p.description || '');
                    $('#translateAiPreviewScope').val(p.scope || '');
                    $('#translateAiPreviewRiskMitigation').val(p.risk_mitigation_controls || '');
                    $('#translateAiPreviewPciDss').val(p.pci_dss_requirement || '');
                    $('#translateAiPreviewIso27001').val(p.iso27001_requirement || '');
                    $('#translateAiPreviewNote').val(p.note || '');
                    $('#translateAiPreviewSection').show();
                    $('#translateAiSaveBtn').show();
                } else {
                    $('#translateAiErrorMessage').text(response.message || '{% trans "Failed to generate preview" %}');
                    $('#translateAiErrorContainer').show();
                }
            },
            error: function(xhr) {
                $btn.prop('disabled', false);
                const msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : '{% trans "Error generating translation preview" %}';
                $('#translateAiErrorMessage').text(msg);
                $('#translateAiErrorContainer').show();
            }
        });
    });

    $('#translateAiSaveBtn').on('click', function() {
        const vulnerabilityId = $('#translateAiVulnerability').val();
        const countryId = $('#translateAiCountry').val();
        if (!vulnerabilityId || !countryId) return;
        const payload = {
            vulnerability_id: parseInt(vulnerabilityId, 10),
            country_id: parseInt(countryId, 10),
            name_local: $('#translateAiPreviewNameLocal').val() || '',
            description: $('#translateAiPreviewDescription').val() || '',
            scope: $('#translateAiPreviewScope').val() || '',
            risk_mitigation_controls: $('#translateAiPreviewRiskMitigation').val() || '',
            pci_dss_requirement: $('#translateAiPreviewPciDss').val() || '',
            iso27001_requirement: $('#translateAiPreviewIso27001').val() || '',
            note: $('#translateAiPreviewNote').val() || ''
        };
        const $btn = $(this);
        $btn.prop('disabled', true);
        $.ajax({
            url: '{% url "save_vulnerability_translation" %}',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(payload),
            headers: {'X-CSRFToken': getCookie('csrftoken')},
            success: function(response) {
                $btn.prop('disabled', false);
                if (response.success) {
                    showAlert('success', '{% trans "Translation saved" %}');
                    $('#translateAiPreviewSection').hide();
                    $('#translateAiSaveBtn').hide();
                    if (vulnerabilitiesTable) vulnerabilitiesTable.ajax.reload();
                } else {
                    $('#translateAiErrorMessage').text(response.message || '{% trans "Failed to save" %}');
                    $('#translateAiErrorContainer').show();
                }
            },
            error: function(xhr) {
                $btn.prop('disabled', false);
                const msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : '{% trans "Error saving translation" %}';
                $('#translateAiErrorMessage').text(msg);
                $('#translateAiErrorContainer').show();
            }
        });
    });

    function saveSelectedVulnerabilities() {
        const selectedIndices = [];
        $('.generated-vulnerability-checkbox:checked').each(function() {
            selectedIndices.push($(this).data('index'));
        });

        if (selectedIndices.length === 0) {
            showAlert('warning', '{% trans "Please select vulnerabilities to save" %}');
            return;
        }

        // Get the selected vulnerabilities from the global variable (dynamic langs)
        const langCodes = getVulnFormLanguages().map(l => l.code);
        const selectedVulnerabilities = selectedIndices.map(index => {
            const vuln = currentGeneratedVulnerabilities[index];
            const out = {};
            langCodes.forEach(lang => {
                out['vulnerability_' + lang] = vuln['vulnerability_' + lang] || (lang === 'en' ? (vuln.vulnerability || vuln.vulnerability_en || '') : '');
                out['scope_' + lang] = vuln['scope_' + lang] || (lang === 'en' ? (vuln.scope || vuln.scope_en || '') : '');
                out['description_' + lang] = vuln['description_' + lang] || (lang === 'en' ? (vuln.description || vuln.description_en || '') : '');
                out['risk_mitigation_controls_' + lang] = vuln['risk_mitigation_controls_' + lang] || (lang === 'en' ? (vuln.risk_mitigation_controls || vuln.risk_mitigation_en || '') : '');
                out['pci_dss_requirement_' + lang] = vuln['pci_dss_requirement_' + lang] || (lang === 'en' ? (vuln.pci_dss_requirement || vuln.pci_dss_requirement_en || '') : '');
                out['iso27001_requirement_' + lang] = vuln['iso27001_requirement_' + lang] || (lang === 'en' ? (vuln.iso27001_requirement || vuln.iso27001_requirement_en || '') : '');
                out['note_' + lang] = vuln['note_' + lang] || (lang === 'en' ? (vuln.note || vuln.note_en || '') : '');
            });
            return out;
        });

        console.log("Saving selected vulnerabilities:", selectedVulnerabilities);
        
        // Send selected vulnerabilities to the server
        $.ajax({
            url: '{% url "save_generated_vulnerabilities" %}',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                asset_group: $('#aiAssetGroup').val(),
                asset_type: $('#aiAssetType').val(),
                vulnerabilities: selectedVulnerabilities
            }),
            headers: {'X-CSRFToken': getCookie('csrftoken')},
            success: function(response) {
                if (response.success) {
                    showAlert('success', '{% trans "Vulnerabilities saved successfully" %}');
                    $('#addVulnerabilityAIModal').modal('hide');
                    vulnerabilitiesTable.ajax.reload();
                } else {
                    showAlert('error', response.error || '{% trans "Failed to save vulnerabilities" %}');
                }
            },
            error: function(xhr, status, error) {
                console.error("Error saving vulnerabilities:", error);
                console.error("Server response:", xhr.responseText);
                showAlert('error', '{% trans "Failed to save vulnerabilities" %}');
            }
        });
    }

    // Add success handler for the delete form submission
    $('#deleteVulnerabilityForm').on('submit', function(e) {
        e.preventDefault(); // Prevent standard form submission
        
        const form = $(this);
        const url = form.attr('action');
        
        $.ajax({
            url: url,
            type: 'POST',
            data: form.serialize(), // This includes the csrf token automatically
            success: function(response) {
                $('#deleteConfirmationModal').modal('hide');
                vulnerabilitiesTable.ajax.reload();
                showAlert('success', response.message || '{% trans "Vulnerability deleted successfully" %}');
            },
            error: function(xhr) {
                console.error("Error deleting vulnerability:", xhr.responseText);
                let errorMessage = '{% trans "Failed to delete vulnerability" %}';
                
                try {
                    const response = JSON.parse(xhr.responseText);
                    errorMessage = response.message || errorMessage;
                    
                    // Handle case where vulnerability has associations
                    if (xhr.status === 409 && response.has_associations) {
                        // Show the force delete option
                        $('#associationsWarning').show();
                        $('#assetCount').text(response.asset_count);
                        $('#forceDeleteCheckbox').prop('checked', false);
                        return; // Don't close modal, let user choose force delete option
                    }
                } catch (e) {
                    console.error("Error parsing response:", e);
                }
                
                showAlert('error', errorMessage);
                $('#deleteConfirmationModal').modal('hide');
            }
        });
    });
});
</script>
