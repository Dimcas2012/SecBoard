<!-- SecBoard\templates\app_access\modals\edit_request_status_modal.html -->
{% load i18n %}

<div class="modal fade" id="editStatusModal" tabindex="-1" aria-labelledby="editStatusModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editStatusModalLabel">{% trans "Update Request Status" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="statusSelect" class="form-label">{% trans "Status" %}</label>
                    <select class="form-select" id="statusSelect">
                        {% for status_code, status_name in statuses %}
                            <option value="{{ status_code }}">{{ status_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="statusComment" class="form-label">{% trans "Comment" %}</label>
                    <textarea class="form-control" id="statusComment" rows="3" 
                              placeholder="{% trans 'Add a comment (optional)' %}"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    {% trans "Cancel" %}
                </button>
                <button type="button" class="btn btn-primary" id="confirmStatusChange">
                    {% trans "Update Status" %}
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    #editStatusModal .modal-content {
        border-radius: 0.5rem;
    }

    #editStatusModal .modal-header {
        background-color: #f8f9fa;
        border-radius: 0.5rem 0.5rem 0 0;
    }

    #editStatusModal .form-label {
        font-weight: 500;
    }

    #editStatusModal .form-select,
    #editStatusModal .form-control {
        border-radius: 0.25rem;
    }

    #editStatusModal .btn {
        border-radius: 0.25rem;
        padding: 0.375rem 1rem;
    }
</style>
