<!-- SecBoard\templates\app_access\modals\edit_default_accessright_modal.html -->
{% load i18n %}

<link href="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/modular/sortable.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<div class="modal fade" id="editAccessRightsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{% trans "Edit Default Access Rights" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="accessRightsModalAlerts"></div>
                
                <!-- Пошукове поле -->
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" 
                               class="form-control" 
                               id="searchAccessRightsInput" 
                               placeholder="{% trans 'Search access rights...' %}"
                               autocomplete="off">
                        <button class="btn btn-outline-secondary" 
                                type="button" 
                                id="clearSearchAccessRightsInput"
                                style="display: none;">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <small class="text-muted" id="searchAccessRightsResultsCount" style="display: none;">
                        <i class="bi bi-info-circle"></i> 
                        <span id="searchAccessRightsResultsText"></span>
                    </small>
                </div>
                
                <!-- Таблиця прав -->
                <div class="table-responsive mb-3">
                    <table class="table table-hover table-sm table-sm-font sb-data-table" id="editAccessRightsTable">
                        <thead>
                            <tr>
                                <th style="width: 40px"></th>
                                <th style="width: 70px">{% trans "Order" %}</th>
                                <th>{% trans "Name" %}</th>
                                <th>{% trans "Description" %}</th>
                                <th>{% trans "Color" %}</th>
                                <th>{% trans "Actions" %}</th>
                            </tr>
                        </thead>
                        <tbody class="sortable-list">
                            <!-- Права будуть додані тут динамічно -->
                        </tbody>
                    </table>
                </div>

                <!-- Кнопка додавання нового права -->
                <button type="button" class="btn btn-primary" id="addAccessRightBtn">
                    <i class="bi bi-plus-circle"></i> {% trans "Add Access Right" %}
                </button>

                <!-- Форма для додавання/редагування права -->
                <form id="accessRightForm" class="d-none mt-3">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="accessRightName" class="form-label required">{% trans "Name" %}</label>
                            <input type="text" class="form-control" id="accessRightName" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="accessRightColor" class="form-label">{% trans "Color" %}</label>
                            <input type="color" class="form-control form-control-color w-100" id="accessRightColor" name="color" value="#6c757d">
                        </div>
                        <div class="col-12">
                            <label for="accessRightDescription" class="form-label">{% trans "Description" %}</label>
                            <textarea class="form-control" id="accessRightDescription" name="description" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-success">{% trans "Save Access Right" %}</button>
                            <button type="button" class="btn btn-secondary" id="cancelAccessRightEdit">{% trans "Cancel" %}</button>
                        </div>
                    </div>
                    <input type="hidden" id="accessRightId">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('editAccessRightsModal');
    const accessRightForm = document.getElementById('accessRightForm');
    let currentSystemId = null;

    // Ініціалізація модального вікна
    modal.addEventListener('show.bs.modal', function(event) {
        currentSystemId = document.getElementById('systemSelect').value;
        if (!currentSystemId) {
            event.preventDefault();
            toastr.error('{% trans "Please select a system first" %}');
            return;
        }
        loadAccessRights();
    });

    // Додавання нового права
    document.getElementById('addAccessRightBtn').addEventListener('click', function() {
        accessRightForm.classList.remove('d-none');
        accessRightForm.reset();
        document.getElementById('accessRightId').value = '';
    });

    // Скасування редагування
    document.getElementById('cancelAccessRightEdit').addEventListener('click', function() {
        accessRightForm.classList.add('d-none');
        accessRightForm.reset();
    });

    // Обробка форми
    accessRightForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Поточне середовище з атрибуту модалі
        const environment = modal.getAttribute('data-environment') || 'test';

        const accessRightData = {
            system_id: currentSystemId,
            name: document.getElementById('accessRightName').value.trim(),
            description: document.getElementById('accessRightDescription').value || '',
            color: document.getElementById('accessRightColor').value,
            right_id: document.getElementById('accessRightId').value || null,
            environment: environment
        };

        const languagePrefix = window.location.pathname.split('/')[1];
        $.ajax({
            url: `/${languagePrefix}/app_access/access-rights/save/`,
            type: 'POST',
            data: accessRightData,
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            success: function(response) {
                if (response.success) {
                    showModalAlert('success', response.message);
                    loadAccessRights();
                    accessRightForm.classList.add('d-none');
                    accessRightForm.reset();
                } else {
                    showModalAlert('danger', response.error);
                }
            },
            error: function(xhr) {
                showModalAlert('danger', xhr.responseJSON?.error || '{% trans "Error saving access right" %}');
            }
        });
    });

    // Завантаження прав доступу
    function loadAccessRights() {
        const languagePrefix = window.location.pathname.split('/')[1];
        const environment = modal.getAttribute('data-environment') || 'test';
        
        console.log('loadAccessRights using environment:', environment);
        
        $.ajax({
            url: `/${languagePrefix}/app_access/access-rights/system/?system_id=${currentSystemId}&environment=${environment}`,
            type: 'GET',
            success: function(response) {
                if (response.rights) {
                    updateAccessRightsTableInModal(response.rights);
                }
            },
            error: function(error) {
                showModalAlert('danger', '{% trans "Error loading access rights" %}');
            }
        });
    }

    // Оновлення таблиці прав в модальному вікні
    function updateAccessRightsTableInModal(rights) {
        const tbody = document.querySelector('#editAccessRightsTable tbody');
        tbody.innerHTML = '';
        
        rights.forEach((right, index) => {
            const name = right.name || '';
            const description = right.description || '';
            const order = right.order !== undefined ? right.order : index;
            
            const tr = document.createElement('tr');
            tr.dataset.rightId = right.id;
            tr.dataset.order = order;
            tr.innerHTML = `
                <td>
                    <div class="drag-handle">
                        <i class="bi bi-grip-vertical"></i>
                    </div>
                </td>
                <td>
                    <input type="number" class="form-control form-control-sm order-input" min="0" value="${order}" data-right-id="${right.id}" style="width: 55px;">
                </td>
                <td>
                    <div class="d-flex align-items-center">
                        <div class="color-dot me-2" 
                             style="width: 12px; height: 12px; border-radius: 50%; background-color: ${right.color}">
                        </div>
                        <span>${name}</span>
                    </div>
                </td>
                <td>${description || ''}</td>
                <td>
                    <div class="color-preview" 
                         style="width: 30px; height: 20px; border-radius: 4px; background-color: ${right.color}">
                    </div>
                </td>
                <td>
                    <div class="btn-group">
                        <button type="button" class="btn btn-sm btn-outline-primary edit-access-right" data-right-id="${right.id}">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger delete-access-right" data-right-id="${right.id}">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
        attachAccessRightsOrderInputHandlers();
    }

    // Показ сповіщень в модальному вікні
    function showModalAlert(type, message) {
        const alertsContainer = document.getElementById('accessRightsModalAlerts');
        const alert = document.createElement('div');
        alert.className = `alert alert-${type} alert-dismissible fade show`;
        alert.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        alertsContainer.appendChild(alert);
        
        setTimeout(() => {
            alert.remove();
        }, 5000);
    }

    // Додаємо обробник закриття модального вікна
    modal.addEventListener('hidden.bs.modal', function() {
        const systemId = document.getElementById('systemSelect').value;
        if (systemId) {
            // Перезавантажуємо список прав доступу
            const languagePrefix = window.location.pathname.split('/')[1];
            $.ajax({
                url: `/${languagePrefix}/app_access/access-rights/system/?system_id=${systemId}`,
                type: 'GET',
                success: function(response) {
                    if (response.rights) {
                        // Оновлюємо таблицю в основному вікні
                        if (typeof updateAccessRightsTable === 'function') {
                            updateAccessRightsTable(response.rights);
                        }
                        // Показуємо блок прав доступу
                        document.getElementById('defaultAccessRightSection').style.display = 'block';
                    }
                },
                error: function(error) {
                    console.error('Error reloading access rights:', error);
                    if (typeof toastr !== 'undefined') {
                        toastr.error('{% trans "Error reloading access rights" %}');
                    }
                }
            });
        }
    });

    // Обробник для кнопки Edit
    document.addEventListener('click', function(e) {
        if (e.target.closest('.edit-access-right')) {
            const rightId = e.target.closest('.edit-access-right').dataset.rightId;
            const languagePrefix = window.location.pathname.split('/')[1];
            
            $.ajax({
                url: `/${languagePrefix}/app_access/access-rights/${rightId}/`,
                type: 'GET',
                success: function(response) {
                    document.getElementById('accessRightId').value = response.id;
                    document.getElementById('accessRightName').value = response.name || '';
                    document.getElementById('accessRightDescription').value = response.description || '';
                    document.getElementById('accessRightColor').value = response.color || '#6c757d';
                    accessRightForm.classList.remove('d-none');
                },
                error: function() {
                    showModalAlert('danger', '{% trans "Error loading access right details" %}');
                }
            });
        }
    });

    // Обробник для кнопки Delete
    document.addEventListener('click', function(e) {
        if (e.target.closest('.delete-access-right')) {
            if (confirm('{% trans "Are you sure you want to delete this access right?" %}')) {
                const rightId = e.target.closest('.delete-access-right').dataset.rightId;
                const languagePrefix = window.location.pathname.split('/')[1];
                
                $.ajax({
                    url: `/${languagePrefix}/app_access/access-rights/${rightId}/`,
                    type: 'DELETE',
                    headers: {
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    success: function(response) {
                        if (response.success) {
                            showModalAlert('success', response.message);
                            loadAccessRights();
                        }
                    },
                    error: function(xhr) {
                        const errorMessage = xhr.responseJSON?.message || '{% trans "Error deleting access right" %}';
                        showModalAlert('danger', errorMessage);
                    }
                });
            }
        }
    });

    // Ініціалізація Sortable
    const tbody = document.querySelector('#editAccessRightsTable tbody');
    new Sortable(tbody, {
        handle: '.drag-handle',
        animation: 150,
        onEnd: function(evt) {
            updateAccessRightsOrder();
        }
    });

    // Функція оновлення порядку
    function updateAccessRightsOrder() {
        const rows = tbody.querySelectorAll('tr');
        const orders = Array.from(rows).map((row, index) => ({
            id: row.dataset.rightId,
            order: index
        }));

        const languagePrefix = window.location.pathname.split('/')[1];
        $.ajax({
            url: `/${languagePrefix}/app_access/access-rights/update-order/`,
            type: 'POST',
            data: JSON.stringify({ orders: orders }),
            contentType: 'application/json',
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            success: function(response) {
                if (response.success) {
                    showModalAlert('success', response.message);
                    rows.forEach((row, index) => {
                        const input = row.querySelector('.order-input');
                        if (input) input.value = index;
                    });
                }
            },
            error: function(xhr) {
                showModalAlert('danger', '{% trans "Error updating order" %}');
            }
        });
    }

    function attachAccessRightsOrderInputHandlers() {
        tbody.querySelectorAll('.order-input').forEach(input => {
            input.removeEventListener('blur', handleAccessRightOrderChange);
            input.addEventListener('blur', handleAccessRightOrderChange);
        });
    }
    function handleAccessRightOrderChange(e) {
        const input = e.target;
        const row = input.closest('tr');
        const targetOrder = parseInt(input.value, 10);
        if (isNaN(targetOrder) || targetOrder < 0) return;
        const rows = Array.from(tbody.querySelectorAll('tr'));
        const currentIndex = rows.indexOf(row);
        if (currentIndex === -1) return;
        const newIndex = Math.min(targetOrder, rows.length - 1);
        if (newIndex === currentIndex) return;
        if (newIndex < currentIndex) {
            row.parentNode.insertBefore(row, rows[newIndex]);
        } else {
            row.parentNode.insertBefore(row, rows[newIndex].nextSibling);
        }
        updateAccessRightsOrder();
    }
    
    // Функція налаштування пошуку прав доступу
    function setupAccessRightsSearch() {
        const searchInput = document.getElementById('searchAccessRightsInput');
        const clearButton = document.getElementById('clearSearchAccessRightsInput');
        const resultsCount = document.getElementById('searchAccessRightsResultsCount');
        const resultsText = document.getElementById('searchAccessRightsResultsText');
        const tbody = document.querySelector('#editAccessRightsTable tbody');
        
        if (!searchInput) return;
        
        // Обробник введення тексту в пошук
        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase().trim();
            
            if (searchTerm.length > 0) {
                clearButton.style.display = 'block';
                filterAccessRights(searchTerm);
            } else {
                clearButton.style.display = 'none';
                clearAccessRightsSearch();
            }
        });
        
        // Обробник кнопки очищення пошуку
        if (clearButton) {
            clearButton.addEventListener('click', function() {
                searchInput.value = '';
                clearButton.style.display = 'none';
                clearAccessRightsSearch();
                searchInput.focus();
            });
        }
        
        // Функція фільтрації прав доступу
        function filterAccessRights(searchTerm) {
            const allRows = tbody.querySelectorAll('tr');
            let matchCount = 0;
            let totalCount = allRows.length;
            
            // Перевіряємо кожен рядок
            allRows.forEach(row => {
                const nameCell = row.cells[2];
                const descCell = row.cells[3];
                const name = nameCell ? nameCell.textContent.toLowerCase() : '';
                const desc = descCell ? descCell.textContent.toLowerCase() : '';
                const isMatch = name.includes(searchTerm) || desc.includes(searchTerm);
                
                if (isMatch) {
                    row.classList.remove('hidden');
                    row.classList.add('search-match');
                    matchCount++;
                    
                    // Підсвічуємо знайдений текст
                    highlightAccessRightText(nameCell, searchTerm);
                    highlightAccessRightText(descCell, searchTerm);
                } else {
                    row.classList.add('hidden');
                    row.classList.remove('search-match');
                }
            });
            
            // Показуємо результати пошуку
            if (resultsCount && resultsText) {
                resultsCount.style.display = 'block';
                resultsText.textContent = `{% trans "Found" %} ${matchCount} {% trans "of" %} ${totalCount} {% trans "access rights" %}`;
            }
        }
        
        // Функція підсвічування тексту
        function highlightAccessRightText(element, searchTerm) {
            if (!element) return;
            
            const originalText = element.getAttribute('data-original-text') || element.textContent;
            if (!element.getAttribute('data-original-text')) {
                element.setAttribute('data-original-text', originalText);
            }
            
            const lowerText = originalText.toLowerCase();
            const index = lowerText.indexOf(searchTerm);
            
            if (index !== -1) {
                const before = originalText.substring(0, index);
                const match = originalText.substring(index, index + searchTerm.length);
                const after = originalText.substring(index + searchTerm.length);
                
                element.innerHTML = `${before}<span class="search-highlight">${match}</span>${after}`;
            } else {
                element.textContent = originalText;
            }
        }
        
        // Функція очищення пошуку
        function clearAccessRightsSearch() {
            const allRows = tbody.querySelectorAll('tr');
            
            allRows.forEach(row => {
                row.classList.remove('hidden');
                row.classList.remove('search-match');
                
                // Відновлюємо оригінальний текст
                const nameCell = row.cells[2];
                const descCell = row.cells[3];
                if (nameCell && nameCell.getAttribute('data-original-text')) {
                    nameCell.textContent = nameCell.getAttribute('data-original-text');
                }
                if (descCell && descCell.getAttribute('data-original-text')) {
                    descCell.textContent = descCell.getAttribute('data-original-text');
                }
            });
            
            // Ховаємо результати пошуку
            if (resultsCount) {
                resultsCount.style.display = 'none';
            }
        }
    }
    
    // Очищення пошуку при закритті модального вікна
    modal.addEventListener('hidden.bs.modal', function() {
        const searchInput = document.getElementById('searchAccessRightsInput');
        const clearButton = document.getElementById('clearSearchAccessRightsInput');
        const resultsCount = document.getElementById('searchAccessRightsResultsCount');
        if (searchInput) {
            searchInput.value = '';
        }
        if (clearButton) {
            clearButton.style.display = 'none';
        }
        if (resultsCount) {
            resultsCount.style.display = 'none';
        }
    });
    
    // Викликаємо setupAccessRightsSearch після завантаження прав
    modal.addEventListener('shown.bs.modal', function() {
        setupAccessRightsSearch();
    });
});
</script>

<style>
.required:after {
    content: " *";
    color: red;
}

#editAccessRightsTable td {
    vertical-align: middle;
}

.form-control-color {
    height: 38px;
}

/* Order column — однаковий вигляд у всіх модалках */
#editAccessRightsTable .order-input {
    width: 55px;
}

.drag-handle {
    cursor: move;
    color: #6c757d;
    width: 20px;
    text-align: center;
}

.drag-handle:hover {
    color: #000;
}

.sortable-ghost {
    opacity: 0.5;
    background-color: #f8f9fa;
}

.sortable-chosen {
    background-color: #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Стилі для пошуку */
tr.hidden {
    display: none !important;
}

tr.search-match {
    background-color: #fff3cd !important;
}

.search-highlight {
    background-color: #ffeb3b;
    font-weight: bold;
    padding: 1px 2px;
    border-radius: 2px;
}

#searchAccessRightsResultsCount {
    display: block;
    margin-top: 8px;
    font-size: 0.85rem;
}
</style>
