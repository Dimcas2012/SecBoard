{% comment %}
  Toolbar above a table/card body (pattern: user-access-request export-controls).
  Blocks: toolbar_left, toolbar_actions (place btn-group buttons here).
{% endcomment %}
<div class="export-controls access-card-toolbar mb-2">
    <div class="row align-items-center g-1">
        <div class="col-md-6">{% block toolbar_left %}{% endblock %}</div>
        <div class="col-md-6 text-end">
            <div class="btn-group sb-toolbar" role="group">{% block toolbar_actions %}{% endblock %}</div>
        </div>
    </div>
</div>
