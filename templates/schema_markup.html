{% load static %}
<!-- Rich Schema Markup for SEO and AI agents -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@graph": [
        {
            "@type": "WebApplication",
            "@id": "{{ request.build_absolute_uri|cut:'/' }}/#webapp",
            "name": "SecBoard",
            "alternateName": "SecBoard Information Security Platform",
            "description": "Comprehensive cybersecurity platform providing training, risk assessment, incident management, and compliance tools for organizations",
            "url": "{{ request.build_absolute_uri|cut:'/' }}",
            "logo": {
                "@type": "ImageObject",
                "url": "{% static 'images/secboard-logo.png' %}",
                "width": 400,
                "height": 100
            },
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web Browser",
            "offers": {
                "@type": "Offer",
                "price": "0",
                "priceCurrency": "USD",
                "availability": "https://schema.org/InStock"
            },
            "featureList": [
                "Security Awareness Training",
                "Phishing Simulation",
                "Risk Assessment Tools", 
                "Incident Management System",
                "Document Management",
                "Compliance Tracking",
                "Asset Management",
                "Key & Certificate Management",
                "AI-Powered Security Analytics"
            ],
            "audience": {
                "@type": "Audience",
                "audienceType": [
                    "Cybersecurity Professionals",
                    "IT Security Teams", 
                    "Compliance Officers",
                    "Risk Managers"
                ]
            }
        },
        {
            "@type": "Organization",
            "@id": "{{ request.build_absolute_uri|cut:'/' }}/#organization", 
            "name": "SecBoard Team",
            "url": "{{ request.build_absolute_uri|cut:'/' }}",
            "logo": {
                "@type": "ImageObject",
                "url": "{% static 'images/secboard-logo.png' %}"
            },
            "sameAs": [
                "https://secboard.online"
            ],
            "contactPoint": {
                "@type": "ContactPoint",
                "contactType": "customer service",
                "url": "{{ request.build_absolute_uri|cut:'/' }}/contact",
                "availableLanguage": ["English", "Ukrainian", "Russian"]
            }
        },
        {
            "@type": "WebSite",
            "@id": "{{ request.build_absolute_uri|cut:'/' }}/#website",
            "url": "{{ request.build_absolute_uri|cut:'/' }}",
            "name": "SecBoard",
            "description": "Information Security Management Platform",
            "publisher": {
                "@id": "{{ request.build_absolute_uri|cut:'/' }}/#organization"
            },
            "inLanguage": ["en", "uk", "ru"],
            "potentialAction": {
                "@type": "SearchAction",
                "target": {
                    "@type": "EntryPoint",
                    "urlTemplate": "{{ request.build_absolute_uri|cut:'/' }}/search?q={search_term_string}"
                },
                "query-input": "required name=search_term_string"
            }
        },
        {
            "@type": "Course",
            "@id": "{{ request.build_absolute_uri|cut:'/' }}/#cybersecurity-training",
            "name": "Cybersecurity Training Program",
            "description": "Comprehensive cybersecurity awareness and training modules",
            "provider": {
                "@id": "{{ request.build_absolute_uri|cut:'/' }}/#organization"
            },
            "courseMode": "online",
            "educationalLevel": "Professional",
            "about": [
                {
                    "@type": "Thing",
                    "name": "Information Security"
                },
                {
                    "@type": "Thing", 
                    "name": "Cybersecurity"
                },
                {
                    "@type": "Thing",
                    "name": "Risk Management"
                }
            ]
        }
    ]
}
</script>
