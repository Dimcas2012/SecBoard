{% load i18n %}
{# collapse_id, toggle_id, icon_id required; filter_clear_url or clear_btn_id #}
<div class="card-header py-2 d-flex justify-content-between align-items-center">
    <span class="small fw-bold mb-0">
        <i class="bi bi-funnel me-1"></i>{% trans "Filters" %}
    </span>
    <div class="d-flex gap-1">
        {% if filter_clear_url %}
        <a href="{{ filter_clear_url }}" class="btn btn-outline-secondary btn-sm" title="{% trans 'Clear all filters' %}">
            <i class="bi bi-x-circle"></i>
        </a>
        {% else %}
        <button type="button" class="btn btn-outline-secondary btn-sm" id="{% if clear_btn_id %}{{ clear_btn_id }}{% else %}clearAllFilters{% endif %}" title="{% trans 'Clear all filters' %}">
            <i class="bi bi-x-circle"></i>
        </button>
        {% endif %}
        <button type="button" class="btn btn-sm btn-outline-secondary" id="{{ toggle_id }}" aria-expanded="{% if filters_expanded %}true{% else %}false{% endif %}" aria-controls="{{ collapse_id }}" title="{% trans 'Show or hide filters' %}">
            <i class="bi bi-chevron-{% if filters_expanded %}up{% else %}down{% endif %}" id="{{ icon_id }}"></i>
        </button>
    </div>
</div>
