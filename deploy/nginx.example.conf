# Adjust server_name, paths, and SSL certificate paths for your deployment.

server {
    server_name your.site.domain;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/your.site.domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.site.domain/privkey.pem;

    location /static/ {
        alias /opt/secboard-base/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/secboard-base/media/;
        expires 1y;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:9006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name your.site.domain;
    return 301 https://$host$request_uri;
}
